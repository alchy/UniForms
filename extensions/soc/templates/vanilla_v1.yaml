# UniForms starter template – v2 schema
#
# Use this as the starting point for new templates.
# Clone it from the Templates page or copy this file.
#
# Reference: docs/TEMPLATE_AUTHORING.md
# Schema reference: docs/TEMPLATE_GUIDE.md

template_id: vanilla-v1
name: Vanilla – Starter Template
version: '1.0'
category: General
status: draft
description: >
  A minimal starter template demonstrating all v2 schema features.
  Clone this file and customise it for your use case.

# Domain-specific metadata – arbitrary key/value pairs.
# Reference them in fields via:  auto: meta.<key>
# Example:
#   meta:
#     owner_team: Platform Engineering
#     sla_hours: 4
meta: {}

# Per-template workflow states (optional).
# Remove this block to use the global default defined in uniforms.yaml.
# workflow:
#   initial_state: open
#   states:
#     - {id: open,        label: Open,        color: secondary}
#     - {id: in_progress, label: In Progress,  color: primary}
#     - {id: resolved,    label: Resolved,     color: success}
#     - {id: cancelled,   label: Cancelled,    color: danger}

sections:

  # ── SECTION 1: Header ──────────────────────────────────────────────────────
  # Always the first section. Keep the auto: fields – they are filled by the
  # system automatically and are not editable by the user.
  #
  # auto: values: record_id, template_name, template_version, current_user, now
  #               last_saved, meta.<key>
  - id: header
    title: Header
    type: header
    fields:
      - key: title
        label: Title
        hint: Brief description visible in the record list.
        placeholder: 'e.g.: Printer offline – Building B, 3rd floor'

      - key: coordinator
        label: Assigned To
        hint: Person responsible for this record.

      # System fields – filled automatically, not editable
      - key: record_id
        label: Record ID
        auto: record_id

      - key: template_name
        label: Template
        auto: template_name

      - key: template_version
        label: Version
        auto: template_version

  # ── SECTION 2: Details form ────────────────────────────────────────────────
  # A standard form section. Use type: select, textarea, datetime, or text
  # (text is the default – omit type for simple text fields).
  #
  # visible_if / required_if accept simple expressions:
  #   "field_key == 'value'"
  #   "field_key != null"
  #   "a == 'x' && b == 'y'"
  #   "a == 'x' || a == 'y'"
  - id: details
    title: Details
    type: form
    fields:
      - key: priority
        label: Priority
        type: select
        options: [Low, Medium, High, Critical]

      - key: category
        label: Category
        type: select
        options: [Request, Incident, Problem, Change]

      - key: description
        label: Description
        type: textarea

      # This field only appears when priority is High or Critical
      - key: impact_statement
        label: Business Impact
        type: textarea
        hint: Describe the business impact and urgency.
        visible_if: "priority == 'High' || priority == 'Critical'"
        required_if: "priority == 'Critical'"

  # ── SECTION 3: Checklist ───────────────────────────────────────────────────
  # A flat list of steps (no groups). Each step is either:
  #   - a plain string (shorthand)
  #   - a dict with action: + optional hint: / example:
  #
  # For multi-group checklists use step_groups: instead of steps:
  - id: checklist
    title: Steps
    type: checklist
    steps:
      - Acknowledge the request and contact the requester.
      - Investigate the root cause.
      - action: Escalate if the issue cannot be resolved within SLA.
        hint: Check the escalation matrix before escalating.
      - Apply the fix or workaround.
      - Verify the resolution with the requester.
      - Document findings and actions taken.

  # ── SECTION 4: Actions table ───────────────────────────────────────────────
  # type: table with unified column definitions.
  # Per-column: key, label, type (text/select), options, editable.
  # Analyst-added rows (via Add row) are fully editable.
  - id: actions
    title: Actions
    type: table
    allow_append: true
    allow_delete: true
    columns:
      - key: action
        label: Action
      - key: owner
        label: Owner
      - key: due_date
        label: Due Date
      - key: status
        label: Status
        type: select
        options: [Pending, In Progress, Done, N/A]
        editable: true
    rows:
      - action: Initial investigation
        owner: ''
        due_date: ''
      - action: Notify affected parties
        owner: ''
        due_date: ''

  # ── SECTION 5: Closure ────────────────────────────────────────────────────
  # Standard closing section. Conditionally show root cause only on resolution.
  - id: closure
    title: Closure
    type: form
    fields:
      - key: result
        label: Result
        type: select
        options: [Resolved, Duplicate, Cancelled, Cannot Reproduce, Escalated]

      - key: root_cause
        label: Root Cause
        type: textarea
        visible_if: "result == 'Resolved'"

      - key: workaround
        label: Workaround / Notes
        type: textarea

      - key: closed_at
        label: Closed At
        type: datetime
