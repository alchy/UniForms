  - id: closure
    title: Klasifikace a uzavření
    type: form
    description: >
      Uzavření provádí Koordinátor CSIRT po dokončení Odezvy, nebo ihned po Posouzení u False Positive.
      Klasifikace a Severity vyjadřují finální stav. Koordinátor uzavírá záznam v TIS.
    hint: >
      Před uzavřením ověř: (1) podvodná doména je zablokována a Search & Purge dokončen,
      (2) forwarding rules a OAuth aplikace jsou odstraněny, (3) finanční útvar je informován o výsledku,
      (4) oznamovatel je informován o výsledku šetření, (5) důkazy jsou uloženy v IKB.<br><br>
      <b>Metodika klasifikace – Úroveň dopadu:</b><br>
      <b>Nízká</b> – BEC pokus bez provedené platby nebo změny údajů; žádný dopad na regulovanou službu.<br>
      <b>Střední</b> – provedena změna platebních údajů, platba dosud neodešla nebo úspěšně zastavena.<br>
      <b>Vysoká</b> – potvrzená finanční škoda; při zasažení regulované služby splňuje kritéria KBI dle ZKB.<br>
      <b>Kritická</b> – katastrofický finanční nebo reputační dopad; zasažena regulovaná služba; jde vždy o KBI.
    fields:
      - key: final_classification
        label: Klasifikace výsledku
        type: select
        options:
          - True Positive
          - False Positive
          - Benign True Positive
        hint: >
          False Positive: e-mail byl legitimní, podezření se nepotvrdilo.
          Benign True Positive: BEC pokus odhalen včas, žádná škoda nevznikla.
        example: True Positive
      - key: impact_level
        label: Úroveň dopadu
        type: select
        options:
          - Nízká
          - Střední
          - Vysoká
          - Kritická
        option_hints:
          Nízká: BEC pokus bez provedené platby nebo změny údajů. Žádný dopad na regulovanou službu.
          Střední: Dílčí dopad – provedena změna platebních údajů, platba dosud neodešla nebo zastavena.
          Vysoká: Potvrzená finanční škoda. Při zasažení regulované služby splňuje kritéria KBI dle ZKB.
          Kritická: Katastrofický finanční nebo reputační dopad. Zasažena regulovaná služba. Jde vždy o KBI.
        hint: Úroveň Vysoká a Kritická při zasažení regulované služby zakládají povinnost hlášení NÚKIB a ÚCL.
      - key: nukib_notification_required
        label: Povinnost hlášení NÚKIB
        type: select
        options:
          - 'Povinná – Regulovaná služba + Vysoká/Kritická (ZOKB §8, vyhl. 82/2018 Sb.)'
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: 'Lhůty: do 24 h (první hlášení) · do 72 h (detailní hlášení) · do 30 dní (závěrečná zpráva) – dle vyhlášky č. 82/2018 Sb.'
      - key: ucl_notification_required
        label: Povinnost hlášení ÚCL
        type: select
        options:
          - Povinná – Regulovaná letecká služba + Vysoká/Kritická
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: ÚCL (Úřad pro civilní letectví) – hlášení povinné při Vysokém nebo Kritickém dopadu na regulovanou leteckou službu.
      - key: impact_primary_service
        label: Dostupnost primárních služeb organizace
        type: select
        options:
          - Zcela nedostupné
          - Částečně nedostupné / degradované
          - Dostupné bez omezení
          - Netýká se
        hint: Primární = služby poskytované organizací klientům / uživatelům nebo klíčové interní provozní procesy.
      - key: impact_scope
        label: Rozsah zasažených uživatelů / systémů
        type: select
        options:
          - 'Celoplošný (> 50 % uživatelů nebo klíčových systémů)'
          - Významný (10–50 %)
          - 'Omezený (< 10 %)'
          - Individuální (1 uživatel / 1 systém)
      - key: impact_duration
        label: Doba výpadku / narušení (dostupnost)
        type: select
        options:
          - '> 4 hodiny'
          - 1–4 hodiny
          - 15 min – 1 hodina
          - < 15 min
          - Žádný výpadek / narušení
      - key: impact_data
        label: Dopad na data (důvěrnost / integrita)
        type: select
        options:
          - Exfiltrace dat potvrzena
          - Neoprávněný přístup k datům potvrzen
          - Integrita dat narušena
          - Žádný dopad na data
          - Nelze určit
      - key: bec_type_final
        label: Typ BEC (finální)
        type: select
        options:
          - CEO fraud / impersonace vedení nebo obchodního partnera
          - Vendor Email Compromise – změna platebních údajů dodavatele
          - Internal Spearphishing – kompromitovaný interní účet (T1534)
          - Kombinace typů
          - Nelze určit
      - key: financial_loss_confirmed
        label: Finanční škoda
        type: select
        options:
          - Potvrzena – platba odeslána a nezastavena
          - Minimalizována – platba zastavena nebo částečně vrácena
          - Žádná – platba neproběhla nebo pokus odhalen včas
        hint: 'Při potvrzené finanční škodě → koordinuj s právním oddělením podání trestního oznámení Policii ČR.'
      - key: financial_loss_amount
        label: Výše škody (pokud relevantní)
        example: '48 000 EUR'
      - key: root_cause
        label: Root Cause
        type: textarea
        example: >
          Útočník registroval typo-squatting doménu a zaslal podvodný e-mail s žádostí o změnu IBAN dodavatele.
          Platba byla provedena před odhalením útoku. BEC bez kompromitace interního účtu.
      - key: actions_taken
        label: Popis přijatých opatření
        type: textarea
        example: >
          Blokace podvodné domény na M365 · Search & Purge (3 mailboxy) ·
          kontakt banky – transakce zastavena · CISO informován · dodavatel varován · logy uloženy do IKB
      - key: recommendations
        label: Doporučení pro zlepšení
        type: textarea
        example: >
          Zavést dvoufázové ověření změny platebních údajů dodavatelů (telefonické potvrzení na ověřeném čísle).
          Zpřísnit DMARC/DKIM politiky. Školení finančního oddělení zaměřené na BEC.
          Zvážit víceúrovňové schvalování plateb nad stanovenou finanční hranici.
      - key: related_service_requests
        label: Související servisní požadavky
        type: textarea
        hint: >
          Čísla nebo odkazy na servisní požadavky vytvořené v průběhu řešení
          (úpravy politik M365, pravidla blokace, požadavky na změnu konfigurace apod.)
        example: 'SR-2026-1142 – blokace domény na M365 · SR-2026-1143 – úprava DMARC politiky'
      - key: related_security_events
        label: Navázané bezpečnostní události (UIB/IIB)
        type: textarea
        hint: >
          Reference na další šetřené bezpečnostní události otevřené v rámci tohoto incidentu nebo s ním související
          (např. navázaný incident Kompromitace účtu, phishingová kampaň ve stejném časovém okně apod.)
        example: 'UIB-10032026-1045-XXXX – Kompromitace účtu (paralelně šetřeno) · UIB-10032026-0930-YYYY – phishing stejná doména'
      - key: reporter_notified
        label: Oznamovatel informován
        type: select
        options:
          - Ano
          - Ne
      - {key: closed_at, label: Datum uzavření, type: datetime}

