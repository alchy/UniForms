# SOC Collection – konfigurační soubor kolekce
#
# Tento soubor definuje kolekci pro Security Operations Center (SOC / CSIRT).
# Zkopíruj ho do adresáře collections_dir (nastaveného v Settings) jako 'soc.yaml'.
# Poté přidej šablony z extensions/soc/templates/ do schemas_dir/soc/.
#
# UniForms CollectionConfig schéma viz: app/models/collection.py

id: soc
name: "SOC – Security Operations Center"
description: >
  Kolekce UIB workbooků pro CSIRT/SOC tým. Pokrývá řešení bezpečnostních incidentů
  dle interních CSIRT postupů, NIST SP 800-61 a MITRE ATT&CK frameworku.
  Každý workbook provází analytika celým cyklem: detekce → triage → odezva → uzavření.

terminology:
  record: incident
  records: incidenty
  record_id_label: "ID incidentu"
  template: playbook
  templates: playbooks
  records_subtitle: "Všechny incidenty"
  templates_subtitle: "Dostupné playbooks"
  dashboard_subtitle: "Přehled incidentů"
  new_record_btn: "Nový UIB"
  coordinator_label: "Koordinátor CSIRT"
  take_over_btn: "Převzít"
  status_active: "Aktivní"
  status_draft: "Rozpracovaný"
  status_deprecated: "Zrušen"

workflow:
  initial_state: new
  states:
    - id: new
      label: "Nové"
      color: secondary
    - id: open
      label: "Přiřazeno"
      color: primary
    - id: in_progress
      label: "V řešení"
      color: warning
    - id: on_hold
      label: "Pozastaveno"
      color: info
    - id: closed
      label: "Uzavřeno"
      color: success

list_columns:
  - key: case_title
    label: "Popis události"
  - key: incident_coordinator
    label: "Koordinátor CSIRT"

id_format:
  prefix: UIB
  format: "{prefix}-{DDMMYYYY}-{rand:04d}"

roles:
  - id: collection_admin
    label: "CSIRT Lead"
  - id: collection_user
    label: "CSIRT Analytik"
