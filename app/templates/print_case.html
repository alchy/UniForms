<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print – {{ record_id }}</title>
<style>
  /* ── General ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #111; background: #fff; }

  /* ── Toolbar (hidden on print) ── */
  #print-toolbar {
    background: #0d6efd; color: #fff; padding: 10px 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  #print-toolbar .record-label { font-weight: bold; flex: 1; font-size: 13pt; }
  #print-toolbar button {
    border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.15);
    color: #fff; padding: 5px 16px; border-radius: 4px; cursor: pointer; font-size: 10pt;
  }
  #print-toolbar button:hover { background: rgba(255,255,255,0.3); }
  #print-toolbar .btn-close-tab {
    background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3);
  }

  /* ── Content ── */
  #doc-content { max-width: 860px; margin: 0 auto; padding: 24px 32px; }

  /* ── Document header ── */
  .doc-header { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-bottom: 18px; }
  .doc-header h1 { font-size: 16pt; color: #0d6efd; margin-bottom: 4px; }
  .doc-meta { color: #555; font-size: 9pt; margin-top: 6px; }
  .doc-meta span { margin-right: 16px; }
  .status-badge {
    display: inline-block; padding: 2px 10px; border-radius: 3px;
    font-size: 9pt; font-weight: bold;
    border: 1px solid currentColor;
  }
  .status-new     { color: #6c757d; background: #f0f0f0; }
  .status-open    { color: #0d6efd; background: #e7f1ff; }
  .status-in_progress { color: #166534; background: #dcfce7; }
  .status-closed  { color: #333; background: #e5e7eb; }
  .status-on_hold { color: #92400e; background: #fef3c7; }

  /* ── Sections ── */
  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 12pt; font-weight: bold; color: #0d6efd;
    border-bottom: 1px solid #bfdbfe; padding-bottom: 3px; margin-bottom: 10px;
  }
  .subsection-title { font-size: 11pt; font-weight: bold; color: #333; margin: 10px 0 6px 0; }

  /* ── Fields ── */
  .field-row { display: flex; gap: 0; margin-bottom: 5px; align-items: baseline; }
  .field-label { width: 220px; min-width: 220px; font-size: 9pt; color: #555; font-weight: bold; }
  .field-value { flex: 1; font-size: 10.5pt; word-break: break-word; white-space: pre-wrap; }
  .field-empty { color: #aaa; font-style: italic; }

  /* ── Tables ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 9.5pt; margin-bottom: 8px; }
  .data-table th { background: #dbeafe; color: #1d4ed8; padding: 4px 8px; text-align: left; border: 1px solid #bfdbfe; font-size: 9pt; }
  .data-table td { padding: 4px 8px; border: 1px solid #e2e8f0; vertical-align: top; }
  .data-table tbody tr:nth-child(even) td { background: #f8faff; }
  .no-rows { color: #aaa; font-style: italic; font-size: 9pt; }

  /* ── Checklist ── */
  .step-group { margin-bottom: 10px; }
  .step-group-title { font-size: 10pt; font-weight: bold; color: #444; margin-bottom: 5px; }
  .step-item { display: flex; gap: 8px; margin-bottom: 4px; align-items: flex-start; }
  .step-icon { font-size: 12pt; line-height: 1.2; min-width: 16px; }
  .step-done { color: #16a34a; }
  .step-pending { color: #d1d5db; }
  .step-text { flex: 1; font-size: 10pt; padding-top: 1px; }
  .step-note { font-size: 9pt; color: #555; margin-left: 24px; margin-top: 2px; padding-left: 8px; border-left: 2px solid #e5e7eb; }
  .hint-info { font-size: 8.5pt; color: #888; margin-left: 24px; margin-top: 3px; }
  .hint-classif {
    font-size: 8.5pt; color: #78350f;
    background: #fff8e1; border-left: 2pt solid #f59e0b;
    padding: 2pt 6pt; margin: 3pt 0; border-radius: 2pt;
  }

  /* ── RACI ── */
  .raci-legend { font-size: 8pt; color: #555; font-style: italic; margin-bottom: 6px; }
  .raci-r { font-weight: bold; color: #b91c1c; }

  /* ── Classification ── */
  .classif-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 4px; }
  .classif-item .classif-label-txt { font-size: 8pt; color: #888; }
  .classif-item .classif-val-txt { font-weight: bold; font-size: 10pt; }
  .data-source-badge {
    display: inline-block; margin: 2px 3px; padding: 1px 8px;
    border-radius: 3px; font-size: 8pt; font-weight: 600;
    background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
  }

  /* ── Print ── */
  @media print {
    #print-toolbar { display: none !important; }
    #doc-content { padding: 0; max-width: 100%; }
    body { font-size: 10pt; margin: 22mm 14mm; }
    .section { page-break-inside: avoid; }
    .doc-header { border-bottom: 1.5pt solid #0d6efd; }
    .data-table { font-size: 8pt; }
    a { text-decoration: none; color: inherit; }
  }

  /* ── Spinner ── */
  #loading { text-align: center; padding: 60px; color: #888; }
</style>
</head>
<body>

<div id="print-toolbar">
  <span class="record-label" id="tb-record-id">{{ record_id }}</span>
  <button onclick="window.print()">&#x1F5A8; Print / Save PDF</button>
  <button class="btn-close-tab" onclick="window.close()">Close</button>
</div>

<div id="doc-content">
  <div id="loading">Loading record...</div>
</div>

<script>
const RECORD_ID = '{{ record_id }}';

// ── Helpers ───────────────────────────────────────────────────────────────────

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString();
}

function fmtValue(v) {
  if (v === null || v === undefined || v === '') return '<span class="field-empty">–</span>';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Renderers ─────────────────────────────────────────────────────────────────

function renderFields(fields, parent) {
  (fields || []).forEach(f => {
    const row = el('div', 'field-row');
    row.innerHTML = `<div class="field-label">${f.label}</div><div class="field-value">${fmtValue(f.value)}</div>`;
    parent.appendChild(row);
  });
}

function renderTable(section, parent) {
  const cols = section.columns || [];
  const labels = section.column_labels || {};
  const isRaci = section.type === 'raci_table';
  if (!cols.length) return;

  const tbl = el('table', 'data-table');
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  cols.forEach(c => { const th = document.createElement('th'); th.textContent = labels[c] || c; hrow.appendChild(th); });
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  const tbody = document.createElement('tbody');
  const rows = section.rows || [];
  if (!rows.length) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = cols.length;
    td.className = 'no-rows';
    td.textContent = 'No records';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      if (i % 2 === 1) tr.className = 'even';
      cols.forEach(c => {
        const td = document.createElement('td');
        const val = row[c];
        const example = row[c + '_example'];
        if (val !== null && val !== undefined && val !== '') {
          td.textContent = val;
          if (isRaci && c !== 'activity' && /^R[\s,]|^R$/.test(String(val).trim())) {
            td.className = 'raci-r';
          }
        } else if (example !== null && example !== undefined && example !== '') {
          td.innerHTML = `<span class="field-empty">${example}</span>`;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }
  tbl.appendChild(tbody);
  parent.appendChild(tbl);
}

function renderChecklist(section, parent) {
  (section.step_groups || []).forEach(group => {
    const grpDiv = el('div', 'step-group');
    if (group.title) grpDiv.appendChild(el('div', 'step-group-title', group.title));

    (group.steps || []).forEach(step => {
      const item = el('div', 'step-item');
      const icon = el('span', 'step-icon ' + (step.done ? 'step-done' : 'step-pending'));
      icon.textContent = step.done ? '✓' : '○';
      const txt = el('div', 'step-text', String(step.action || '').replace(/</g,'&lt;'));
      item.appendChild(icon);
      item.appendChild(txt);
      grpDiv.appendChild(item);
      if (step.analyst_note) {
        grpDiv.appendChild(el('div', 'step-note', fmtValue(step.analyst_note)));
      }
    });

    (group.hints || []).forEach(h => {
      grpDiv.appendChild(el('div', 'hint-info', '› ' + h));
    });
    (group.classification_hints || []).forEach(h => {
      grpDiv.appendChild(el('div', 'hint-classif', '⬧ ' + h));
    });

    parent.appendChild(grpDiv);
  });

  if (section.result) {
    parent.appendChild(el('div', 'subsection-title', section.result.title || ''));
    renderFields(section.result.fields || [], parent);
  }
}

function renderClassification(section, parent) {
  const grid = el('div', 'classif-grid');
  (section.fields || []).filter(f => f.key !== 'data_sources').forEach(field => {
    const val = (field.value !== null && field.value !== undefined && field.value !== '') ? field.value : '–';
    const d = el('div', 'classif-item');
    d.innerHTML = `<div class="classif-label-txt">${field.label}</div><div class="classif-val-txt">${val}</div>`;
    grid.appendChild(d);
  });
  parent.appendChild(grid);

  const dsField = (section.fields || []).find(f => f.key === 'data_sources');
  if (dsField && dsField.value) {
    const sources = Array.isArray(dsField.value)
      ? dsField.value
      : String(dsField.value).split(',').map(s => s.trim()).filter(Boolean);
    const wrap = el('div');
    wrap.style.marginTop = '6px';
    sources.forEach(s => {
      wrap.appendChild(el('span', 'data-source-badge', s));
    });
    parent.appendChild(wrap);
  }
}

function renderSubsection(sub, parent) {
  switch (sub.type) {
    case 'form':
    case 'closure_form':
      renderFields(sub.fields || [], parent);
      break;
    case 'checklist':
      renderChecklist(sub, parent);
      break;
    default:
      if (sub.columns !== undefined) renderTable(sub, parent);
  }
}

function renderSection(section, recordData) {
  const div = el('div', 'section');
  div.id = 'sec-' + section.id;
  div.appendChild(el('div', 'section-title', section.title));

  switch (section.type) {
    case 'workbook_header':
    case 'playbook_header':
    case 'record_header':
    case 'form':
    case 'closure_form':
      renderFields(section.fields || [], div);
      break;
    case 'classification':
      renderClassification(section, div);
      break;
    case 'section_group':
      (section.subsections || []).forEach(sub => {
        div.appendChild(el('div', 'subsection-title', sub.title));
        renderSubsection(sub, div);
      });
      break;
    case 'checklist':
      renderChecklist(section, div);
      break;
    case 'raci_table':
      if (section.legend) div.appendChild(el('div', 'raci-legend', section.legend));
      renderTable(section, div);
      break;
    default:
      if (section.columns !== undefined) renderTable(section, div);
  }

  return div;
}

// ── Main ──────────────────────────────────────────────────────────────────────

async function loadAndRender() {
  const resp = await fetch(`/api/v1/records/${RECORD_ID}`, {credentials: 'include'});
  if (!resp.ok) {
    document.getElementById('doc-content').innerHTML =
      '<p style="color:red;padding:40px;">Record not found or access denied.</p>';
    return;
  }
  const rec = await resp.json();

  const statusStates = rec.data?.workflow_states || {};
  const stateInfo = statusStates[rec.status] || {label: rec.status};

  const recTitle = (rec.data?.sections || [])
    .find(s => ['workbook_header','playbook_header','record_header'].includes(s.type))
    ?.fields?.find(f => ['case_title','record_title','title'].includes(f.key))?.value || null;

  document.title = `Print – ${RECORD_ID}`;
  document.getElementById('tb-record-id').textContent = RECORD_ID + (recTitle ? ' – ' + recTitle : '');

  const header = el('div', 'doc-header');
  header.innerHTML = `
    <h1>${rec.data.template_name || rec.template_id}</h1>
    <div style="margin:4px 0;">
      <span class="status-badge status-${rec.status}">${stateInfo.label || rec.status}</span>
      &nbsp;<strong style="font-size:12pt;">${RECORD_ID}</strong>
    </div>
    <div class="doc-meta">
      <span><strong>Created by:</strong> ${rec.created_by}</span>
      <span><strong>Created:</strong> ${fmtDate(rec.created_at)}</span>
      ${rec.updated_at ? `<span><strong>Updated:</strong> ${fmtDate(rec.updated_at)}</span>` : ''}
      <span><strong>Printed:</strong> ${new Date().toLocaleString()}</span>
    </div>`;

  const container = document.getElementById('doc-content');
  container.innerHTML = '';
  container.appendChild(header);

  (rec.data.sections || []).forEach(section => {
    container.appendChild(renderSection(section, rec.data));
  });
}

loadAndRender();
</script>
</body>
</html>
