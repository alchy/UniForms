# UniForms – konfigurace nasazení. Plná dokumentace: uniforms.yaml.example
# Všechny klíče jsou volitelné – neuvedené hodnoty mají rozumné výchozí nastavení.

app:
  name: "UniForms"
  subtitle: "Universal Forms Engine"

# Doménové pojmy – přepiš jen to, co se ve tvé doméně jmenuje jinak.
# (Kompletní katalog UI textů: TerminologyConfig v app/config.py;
#  kterýkoli klíč lze přepsat i zde, nebo per-kolekce v collection YAML.)
terminology:
  record_id_label: "Record ID"
  record_owner_label: "Record Owner"
  new_record_btn: "New Record"
  take_over_btn: "Take Over"

# Formát generovaného ID záznamu.
# Tokeny: {prefix}, {DDMMYYYY}, {YYYYMM}, {YYYY}, {MM}, {DD}, {HHMM}, {rand:04d}
id:
  prefix: "REC"
  format: "{prefix}-{YYYYMM}-{rand:04d}"

# Výchozí workflow – použije se, když kolekce nedefinuje vlastní `workflow.states`.
# color: Bootstrap varianta (primary, secondary, …) nebo libovolná CSS barva.
workflow:
  initial_state: new
  states:
    - { id: new,         label: "New",         color: secondary }
    - { id: open,        label: "Open",        color: primary }
    - { id: in_progress, label: "In Progress", color: warning }
    - { id: on_hold,     label: "On Hold",     color: info }
    - { id: closed,      label: "Closed",      color: success }
