template_id: prijem_zvirete_v1
name: Příjem zvířete
version: '1.0'
category: Zverimex
status: active
description: Formulář pro příjem nového zvířete do péče.

sections:
  - id: header
    title: Základní informace
    type: header
    fields:
      - key: record_id
        label: Číslo záznamu
        auto: record_id
      - key: template_name
        label: Typ formuláře
        auto: template_name
      - key: koordinator
        label: Odpovědný zaměstnanec
        auto: current_user
      - key: datum_prijmu
        label: Datum příjmu
        auto: now
        editable: false

  - id: zvirete
    title: Údaje o zvířeti
    type: form
    fields:
      - key: druh
        label: Druh zvířete
        type: select
        options:
          - Pes
          - Kočka
          - Králík
          - Morče
          - Papoušek
          - Plaz
          - Ryba
          - Jiné
      - key: plemeno
        label: Plemeno / Druh
        placeholder: např. Labrador, Perský kocour…
      - key: jmeno
        label: Jméno zvířete
        placeholder: pokud má
      - key: vek_odhadem
        label: Věk (odhadem)
        placeholder: např. 2 roky, 6 měsíců
      - key: pohlavi
        label: Pohlaví
        type: select
        options:
          - Samec
          - Samice
          - Neznámé
      - key: barva_zbarveni
        label: Barva / zbarvení
      - key: zdravotni_stav
        label: Zdravotní stav při příjmu
        type: textarea
        placeholder: Stručný popis stavu, viditelná zranění, nemoci…

  - id: dodavatel
    title: Původ zvířete
    type: form
    fields:
      - key: zdroj
        label: Zdroj
        type: select
        options:
          - Chovatel
          - Záchranná stanice
          - Nalezeno
          - Vrácení zákazníkem
          - Jiné
      - key: jmeno_dodavatele
        label: Jméno dodavatele / chovatel
      - key: kontakt_dodavatele
        label: Kontakt
        placeholder: telefon nebo e-mail
      - key: poznamka
        label: Poznámka
        type: textarea
