template_id: testovaci_jizda_v1
name: Testovací jízda
version: '1.0'
category: Autobazar
status: active
description: Záznam o testovací jízdě zákazníka.

sections:
  - id: header
    title: Základní informace
    type: header
    fields:
      - key: record_id
        label: Číslo záznamu
        auto: record_id
      - key: template_name
        label: Typ formuláře
        auto: template_name
      - key: obchodnik
        label: Obchodník
        auto: current_user
      - key: datum
        label: Datum a čas
        auto: now
        editable: false

  - id: vozidlo
    title: Vozidlo
    type: form
    fields:
      - key: znacka
        label: Značka a model
        required: true
        placeholder: např. Škoda Octavia 1.6 TDI
      - key: spz
        label: SPZ
      - key: stav_km_pred
        label: Stav km před jízdou
        type: number
      - key: stav_km_po
        label: Stav km po jízdě
        type: number

  - id: zakaznik
    title: Zákazník
    type: form
    fields:
      - key: jmeno_zakaznika
        label: Jméno a příjmení
        required: true
      - key: cislo_rl
        label: Číslo ŘP
        required: true
      - key: telefon
        label: Telefon
      - key: souhlas_gdpr
        label: Souhlas se zpracováním osobních údajů
        type: select
        options:
          - 'Ano'
          - 'Ne'

  - id: vysledek
    title: Výsledek
    type: form
    fields:
      - key: zajem
        label: Zájem o koupi
        type: select
        options:
          - Ano – pokračujeme
          - Možná – uvažuje
          - Ne – nezájem
      - key: dalsi_krok
        label: Dohodnutý další krok
        type: textarea
        placeholder: nabídka financování, nová schůzka…
      - key: poznamka
        label: Poznámka obchodníka
        type: textarea
