template_id: prodej_vozidla_v1
name: Prodej vozidla
version: '1.0'
category: Autobazar
status: active
description: Formulář pro finalizaci prodeje vozidla zákazníkovi.

sections:
  - id: header
    title: Základní informace
    type: header
    fields:
      - key: record_id
        label: Číslo záznamu
        auto: record_id
      - key: template_name
        label: Typ formuláře
        auto: template_name
      - key: obchodnik
        label: Obchodník
        auto: current_user
      - key: datum_prodeje
        label: Datum prodeje
        auto: now
        editable: false

  - id: vozidlo
    title: Prodávané vozidlo
    type: fields
    fields:
      - key: znacka
        label: Značka a model
        required: true
      - key: spz
        label: SPZ
      - key: vin
        label: VIN
      - key: cena_prodejni_kc
        label: Sjednaná cena (Kč)
        type: number
        required: true

  - id: zakaznik
    title: Kupující
    type: fields
    fields:
      - key: jmeno_zakaznika
        label: Jméno a příjmení
        required: true
      - key: rc_ico
        label: RČ / IČO
      - key: adresa
        label: Adresa
        type: textarea
      - key: telefon
        label: Telefon
      - key: email
        label: E-mail

  - id: platba
    title: Platba a financování
    type: fields
    fields:
      - key: zpusob_platby
        label: Způsob platby
        type: select
        options:
          - Hotově
          - Převodem
          - Leasing
          - Úvěr
          - Kombinace
      - key: zaloha_kc
        label: Zaplacená záloha (Kč)
        type: number
        placeholder: 0 pokud bez zálohy
      - key: poznamka_platba
        label: Poznámka k platbě
        type: textarea

  - id: poznamky
    title: Závěrečné poznámky
    type: fields
    fields:
      - key: predate_klice
        label: Předány klíče
        type: select
        options:
          - 'Ano'
          - 'Ne – čeká se'
      - key: poznamka
        label: Poznámka
        type: textarea
