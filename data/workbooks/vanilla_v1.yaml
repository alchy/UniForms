# VANILLA WORKBOOK v1.0 – výchozí šablona pro tvorbu vlastních SOC workbooků.
# Jak začít: zkopíruj soubor → přejmenuj (např. 'ransomware_v1.yaml') → uprav → testuj.
# Podrobný průvodce: docs/WORKBOOK_AUTHORING.md  |  Technická reference: docs/TEMPLATE_GUIDE.md

# Unikátní ID šablony v systému. Formát: typ-incidentu-vX, malá písmena, pomlčky místo mezer.
# Příklady: ransomware-v1, insider-threat-v1, data-breach-v2. Nesmí se opakovat mezi soubory.
template_id: vanilla-v1

# Zobrazovaný název v seznamu šablon a v záhlaví incidentu. Krátký a výstižný.
name: Vanilla – výchozí šablona

version: '1.0'

# Kategorie pro filtrování. Doporučené hodnoty:
# Phishing, Malware, DDoS, Ransomware, Insider Threat, Data Breach, Unauthorized Access, Vulnerability
category: Obecný incident

# Životní cyklus: draft = ve vývoji (nevyužívej v produkci), active = připraveno, deprecated = nahrazeno.
# Začínáš vždy jako draft.
status: draft

description: Stručný popis účelu šablony – pro jaký typ incidentu je určena a v jakém prostředí. Zobrazuje se v přehledu šablon.

# MITRE ATT&CK – viz https://attack.mitre.org/
# Příklad: tactic='Initial Access', technique='T1566', subtechnique='T1566.001'
# Pokud vazba neexistuje nebo není jasná, ponech prázdné řetězce.
mitre_tactic: doplň taktiku
mitre_technique: doplň techniku
mitre_subtechnique: ''

# Zdroje dat doporučené pro investigaci.
# Příklady: SIEM, EDR, Proxy, DNS, Mail Gateway, Firewall logs, VPN logs, AD/LDAP, Cloud Audit Logs
# Zobrazují se jako badge v sekci Klasifikace.
data_sources:
  - SIEM
  - doplň další zdroje dat

sections:

  # SEKCE 1 – Hlavička workbooku. Povinná, vždy první.
  # Neměň type ani klíče polí ticket_id a workbook_name – jsou provázány se systémem.
  - id: header
    title: Hlavička
    type: workbook_header
    fields:
      # case_title: krátký popis konkrétní události – vyplňuje analytik při zakládání incidentu.
      # example: value slouží jako příklad/placeholder, smaže se při klonování.
      - key: case_title
        label: Stručný popis události
        example: 'Zde analytik napíše krátký popis, např.: Podezřelý přihlášení ze zahraničí – uživatel jan.novak'
        hint: Výstižný popis pro odlišení od ostatních incidentů – viditelný v seznamu.

      # Systémová pole – nevyplňuje se ručně, hodnoty doplní aplikace automaticky.
      - key: ticket_id
        label: Ticket ID
        editable: false
        auto_value: case_id
      - key: workbook_name
        label: Workbook
        editable: false
        auto_value: template_name
      - key: workbook_version
        label: Verze workbooku
        editable: false
        auto_value: template_version

      - key: author
        label: Autor / vlastník šablony
        editable: false
        value: SOC Analytický tým
      - key: incident_coordinator
        label: Koordinátor incidentu
        hint: SOC Analytik odpovědný za řešení incidentu – vyplní se tlačítkem Převzít.

      # Volitelné pole – přidej libovolná další pole relevantní pro tvůj typ incidentu.
      # Například: priority, source_system, assigned_to...
      - key: source_alert
        label: Zdrojový alert / ticket
        hint: ID alertu nebo ticketu ze SIEM / ITSM, ze kterého incident vznikl.

  # SEKCE 2 – Klasifikace MITRE ATT&CK. Povinná.
  # Taktika a Technika jsou read-only (z metadat šablony). Sub-technika je select – analytik vyplní po investigaci.
  # Uprav seznam options dle typických sub-technik pro tvůj typ incidentu.
  - id: classification
    title: Klasifikace
    type: classification
    fields:
      - key: mitre_tactic
        label: MITRE Tactic
        editable: false
        auto_value: template_mitre_tactic
      - key: mitre_technique
        label: MITRE Technique
        editable: false
        auto_value: template_mitre_technique

      # Sub-technika: vyplní analytik po Posouzení, třídění a rozhodování.
      # Uprav options dle typických variant pro tvůj typ incidentu.
      - key: mitre_subtechnique
        label: MITRE Sub-technique
        type: select
        options:
          - Doplň variantu A
          - Doplň variantu B
          - Nelze určit
        hint: Vyplň po Posouzení, třídění a rozhodování, kdy je zřejmý konkrétní vektor útoku.

      - key: data_sources
        label: Doporučené zdroje dat pro investigaci
        editable: false
        auto_value: template_data_sources

  # SEKCE 3 – Kontakty. Volitelná, ale doporučená.
  # Uprav role a doplň kontakty typické pro tvou organizaci.
  - id: contacts
    title: Kontaktní matice
    type: contact_table
    description: Kontakty pro investigaci a eskalaci. Vyplň dle aktuální struktury organizace.
    columns:
      - system_role
      - name
      - email
      - phone
      - when_to_contact
    column_labels:
      system_role: Role / systém
      name: Jméno
      email: E-mail
      phone: Telefon
      when_to_contact: Kdy kontaktovat
    editable_columns:
      - name
      - email
      - phone
    allow_append: true
    append_row_template:
      system_role: null
      name: null
      email: null
      phone: null
      when_to_contact: null
    rows:
      - system_role: Vlastník dotčeného aktiva
        name: Jméno Příjmení
        email: vlastnik@firma.cz
        phone: +420 xxx xxx xxx
        when_to_contact: Ihned po potvrzení incidentu
      - system_role: CISO / Management
        name: Jméno Příjmení
        email: ciso@firma.cz
        phone: +420 xxx xxx xxx
        when_to_contact: Závažnost Vysoká / Kritická
      - system_role: CERT / NÚKIB
        name: Podatelna NÚKIB
        email: podatelna@nukib.cz
        phone: ''
        when_to_contact: Dle ZOKB §8 (Regulovaná služba, Závažnost Kritická/Vysoká)

  # SEKCE 4 – Posouzení, třídění a rozhodování (checklist). Jádro workbooku.
  # Uprav krok po kroku dle svého typu incidentu.
  # Přidávej step_groups pro logické bloky (Posouzení, Analýza, Scope).
  #
  # Každý krok lze zapsat dvěma způsoby:
  #
  #   Zkrácený zápis (pro jednoduché kroky):
  #     - Text instrukce pro analytika.
  #
  #   Plný zápis (pro kroky s hinty, klasifikačními vodítky nebo příkladem):
  #     - action: Text instrukce.
  #       example: Ukázka vyplněné poznámky analytika.
  #       hints:
  #         - Vodítko pro analytika
  #       classification_hints:
  #         - "True Positive → ... | False Positive → ..."
  - id: triage_investigation
    title: Posouzení, třídění a rozhodování
    type: checklist
    description: Postupuj krok za krokem. Zaznamenej výsledky do pole Poznámka analytika u každého kroku.
    step_groups:

      # Skupina 1 – Posouzení: rychlá verifikace alertu a první odhad závažnosti.
      # Uprav kroky dle svého prostředí.
      - title: Posouzení – ověření alertu
        steps:
          - Ověř, zda je alert validní – potvrď základní fakta (kdo, kdy, odkud, co).
          - action: Prověř kontext uživatele / systému v SIEM – porovnej s historickým baselineem.
            example: Analytik zapíše výsledek zde.
          - Urči předběžnou závažnost (Kritická / Vysoká / Střední / Nízká) a scope.
        hints:
          - Pokud alert nelze ověřit nebo je zřejmě falešný, uzavři jako False Positive v sekci Uzavření incidentu.
        classification_hints:
          - "Aktivita potvrzena jako reálná a škodlivá → True Positive | Aktivita potvrzena, ale bez škodlivého záměru → Benign True Positive | Alert bez reálné aktivity → False Positive"

      # Skupina 2 – Investigace: hlubší analýza.
      # Přizpůsob kroky pro svůj typ incidentu.
      # Přidej tolik skupin, kolik potřebuješ – každá skupina je jeden logický blok
      # (např. Analýza malware, Analýza síťové komunikace, Lateral movement...).
      - title: Investigace
        steps:
          - Zkoumej logové záznamy ze zdrojů dat – identifikuj timeline událostí.
          - Ověř, zda incident zasáhl další systémy nebo uživatele – prověř lateral movement.
          - 'Zhodnoť dopad na data: důvěrnost (exfiltrace?), integritu (modifikace?) a dostupnost (výpadek?).'
        hints:
          - Zdokumentuj každý krok – i negativní výsledky (co bylo prověřeno a nenalezeno) jsou důležité pro audit trail.

  # SEKCE 5 – Odezva (action_table).
  # Uprav seznam akcí dle svého typu incidentu.
  # Akce formuluj jako oznamovací tvrzení – co bylo provedeno (ne imperativ).
  - id: containment_remediation
    title: Odezva
    type: action_table
    description: "U každé akce zaznamenej stav. Pokud akce není relevantní, použij stav 'N/A'."
    columns:
      - action
      - responsible_role
      - cooperation
      - status
    column_labels:
      action: Akce
      responsible_role: Zodpovědná role
      cooperation: Součinnost
      status: Stav
    status_options:
      - Provedeno
      - Probíhá
      - Čeká
      - N/A
      - Není nutné provést
    editable_columns:
      - status
    allow_append: true
    allow_delete: true
    append_row_template:
      action: null
      responsible_role: null
      cooperation: null
      status: null
    rows:
      - action: Dotčený účet / systém izolován nebo zablokován
        responsible_role: SOC Analytický tým
        cooperation: Správce systému
        status: null
      - action: Škodlivé IOC (IP, doména, hash) blokovány na perimetru
        responsible_role: SOC Analytický tým
        cooperation: Správce FW / proxy
        status: null
      - action: Dotčené systémy prohledány (AV / EDR scan)
        responsible_role: SOC Analytický tým
        cooperation: IT tým
        status: null
      - action: Záloha klíčových dat ověřena nebo spuštěna obnova
        responsible_role: Správce systému
        cooperation: IT tým
        status: null

  # SEKCE 6 – Klasifikace a uzavření. Povinná.
  # Standardní pole NEMĚŇ (klíče, options, hinty).
  # Šablonově specifická pole přidej ZA nukib_notification_required a PŘED impact_primary_service.
  - id: closure
    title: Klasifikace a uzavření
    type: form
    description: >-
      Uzavření provádí SOC Analytický tým po dokončení Odezvy, nebo ihned po
      Posouzení, třídění a rozhodování u False Positive / Benign True Positive.
    hint: >-
      Před uzavřením ověř, že oznamovatel byl informován o výsledku šetření.<br><br>
      <b>Metodika klasifikace – Úroveň dopadu:</b><br>
      <b>Nízká</b> – incidenty s omezeným nebo lokálním dopadem; žádný dopad na regulovanou službu.<br>
      <b>Střední</b> – postihují důležité systémy, ale nezpůsobují kompletní přerušení klíčových procesů;
      nezasahuje aktiva regulované služby.<br>
      <b>Vysoká</b> – významný dopad na klíčové procesy nebo systémy; při zasažení aktiv regulované služby
      splňují kritéria KBI dle ZKB; ohrožují kontinuitu činnosti nebo reputaci.<br>
      <b>Kritická</b> – katastrofický dopad; vedou k úplnému kolapsu regulované služby, mají masivní finanční
      nebo právní důsledky a ohrožují existenci podniku nebo jeho způsobilost; jde vždy o KBI.
    fields:
      - key: final_classification
        label: Klasifikace výsledku
        type: select
        example: True Positive
        options:
          - True Positive
          - False Positive
          - Benign True Positive

      - key: impact_level
        label: Úroveň dopadu
        type: select
        options:
          - Nízká
          - Střední
          - Vysoká
          - Kritická
        option_hints:
          Nízká: Incidenty s omezeným nebo lokálním dopadem. Žádný dopad na regulovanou službu.
          Střední: >-
            Incidenty, které postihují důležité systémy, ale nezpůsobují kompletní přerušení
            klíčových procesů. Nezasahuje aktiva regulované služby.
          Vysoká: >-
            Incidenty s významným dopadem na klíčové procesy nebo systémy. Při zasažení aktiv
            regulované služby splňují kritéria KBI dle ZKB. Ohrožují kontinuitu činnosti nebo reputaci.
          Kritická: >-
            Incidenty s katastrofickým dopadem. Vedou k úplnému kolapsu regulované služby, mají masivní
            finanční nebo právní důsledky a ohrožují existenci podniku nebo jeho způsobilost. Jde vždy o KBI.
        hint: Úroveň Vysoká a Kritická při zasažení regulované služby zakládají povinnost hlášení NÚKIB a ÚCL.

      - key: nukib_notification_required
        label: Povinnost hlášení NÚKIB
        type: select
        options:
          - Povinná – Regulovaná služba + Vysoká/Kritická (ZOKB §8, vyhl. 82/2018 Sb.)
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: 'Lhůty: do 24 h (první hlášení) · do 72 h (detailní hlášení) · do 30 dní (závěrečná zpráva) – dle vyhlášky č. 82/2018 Sb.'

      - key: ucl_notification_required
        label: Povinnost hlášení ÚCL
        type: select
        options:
          - Povinná – Regulovaná letecká služba + Vysoká/Kritická
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: ÚCL (Úřad pro civilní letectví) – hlášení povinné při Vysokém nebo Kritickém dopadu na regulovanou leteckou službu.

      # MÍSTO PRO ŠABLONOVĚ SPECIFICKÁ POLE.
      # Příklad:
      #   - key: affected_service
      #     label: Dotčená služba
      # Vkládej sem pole relevantní pro tvůj typ incidentu – za ucl_notification_required a před impact_primary_service.
      - key: specific_field_placeholder
        label: Specifická pole pro tento typ incidentu
        editable: false
        value: '– toto pole odstraň a nahraď vlastními poli pro svůj typ incidentu –'

      - key: impact_primary_service
        label: Dostupnost primárních služeb organizace
        type: select
        options:
          - Zcela nedostupné
          - Částečně nedostupné / degradované
          - Dostupné bez omezení
          - Netýká se
        hint: Primární = služby poskytované organizací klientům / uživatelům nebo klíčové interní provozní procesy.

      - key: impact_scope
        label: Rozsah zasažených uživatelů / systémů
        type: select
        options:
          - Celoplošný (> 50 % uživatelů nebo klíčových systémů)
          - Významný (10–50 %)
          - Omezený (< 10 %)
          - Individuální (1 uživatel / 1 systém)

      - key: impact_duration
        label: Doba výpadku / narušení (dostupnost)
        type: select
        options:
          - '> 4 hodiny'
          - 1–4 hodiny
          - 15 min – 1 hodina
          - < 15 min
          - Žádný výpadek / narušení

      - key: impact_data
        label: Dopad na data (důvěrnost / integrita)
        type: select
        options:
          - Exfiltrace dat potvrzena
          - Neoprávněný přístup k datům potvrzen
          - Integrita dat narušena
          - Žádný dopad na data
          - Nelze určit

      - key: root_cause
        label: Root Cause
        type: textarea
        example: Popis kořenové příčiny incidentu

      - key: actions_taken
        label: Popis přijatých opatření
        type: textarea
        example: Stručný souhrn provedených containment a remediation kroků

      - key: recommendations
        label: Doporučení pro zlepšení
        type: textarea
        example: Doporučení pro snížení rizika opakování incidentu

      - key: related_service_requests
        label: Související servisní požadavky
        type: textarea
        hint: Čísla nebo odkazy na servisní požadavky vytvořené v průběhu řešení (blokace, konfigurace, požadavky na změnu apod.)
        example: 'SR-2026-XXXX – popis požadavku'

      - key: related_security_events
        label: Navázané bezpečnostní události (UIB/IIB)
        type: textarea
        hint: >
          Reference na další šetřené bezpečnostní události otevřené v rámci tohoto incidentu nebo s ním související
          (eskalace do jiného workbooku, paralelně šetřené události, stejná kampaň apod.)
        example: 'UIB-10032026-1045-XXXX – Kompromitace účtu (paralelně šetřeno)'

      - key: reporter_notified
        label: Oznamovatel informován
        type: select
        options:
          - Ano
          - Ne

      - key: closed_at
        label: Datum uzavření
        type: datetime

  # SEKCE 7 – RACI matice. Volitelná, ale doporučená.
  # Uprav sloupce a řádky dle struktury tvé organizace.
  # Standardní sloupce: l1_its, koordinator, cirt, r_dtech, r_dplr, garant, delegat, nukib, ucl.
  # Přidej specifické role (např. isp_noc, cloud_provider) dle potřeby.
  # l1_its: zařaď pokud organizace používá L1/L2 strukturu dle SM/25/0100/P5 – L1 eviduje a předává, L2 řídí.
  # DPO: zařaď sloupec jen pokud hrozí únik osobních dat (phishing, data breach, kompromitace účtu).
  - id: raci
    title: RACI matice
    type: raci_table
    legend: >-
      R = Responsible (provádí) · A = Accountable (zodpovídá za výsledek) ·
      C = Consulted (poskytuje součinnost) · I = Informed (je informován) ·
      (Vysoká/Kritická) = podmínka pro aktivaci role
    columns:
      - activity
      - l1_its
      - koordinator
      - cirt
      - r_dtech
      - r_dplr
      - garant
      - delegat
      - nukib
      - ucl
    column_labels:
      activity: Aktivita
      l1_its: L1 (ITS)
      koordinator: Koordinátor
      cirt: CIRT
      r_dtech: Ř-DTECH
      r_dplr: Ř-DPLR
      garant: Garant
      delegat: Delegát
      nukib: NÚKIB
      ucl: ÚCL
    rows:
      - activity: Příjem UIB/IIB a evidence v TIS
        l1_its: R, A
        koordinator: I
        cirt: '–'
        r_dtech: '–'
        r_dplr: '–'
        garant: '–'
        delegat: '–'
        nukib: '–'
        ucl: '–'
      - activity: Předání incidentu Koordinátorovi CSIRT (L2)
        l1_its: R
        koordinator: A
        cirt: '–'
        r_dtech: '–'
        r_dplr: '–'
        garant: '–'
        delegat: '–'
        nukib: '–'
        ucl: '–'
      - activity: Posouzení, třídění a rozhodování
        l1_its: '–'
        koordinator: A
        cirt: R
        r_dtech: '–'
        r_dplr: '–'
        garant: C
        delegat: C
        nukib: '–'
        ucl: '–'
      - activity: Odezva
        l1_its: '–'
        koordinator: A
        cirt: R
        r_dtech: I (Vysoká/Kritická)
        r_dplr: '–'
        garant: A
        delegat: R
        nukib: '–'
        ucl: '–'
      - activity: Notifikace dotčených stran
        l1_its: '–'
        koordinator: R, A
        cirt: '–'
        r_dtech: I
        r_dplr: '–'
        garant: I
        delegat: '–'
        nukib: '–'
        ucl: '–'
      - activity: Eskalace na management
        l1_its: '–'
        koordinator: R
        cirt: '–'
        r_dtech: A
        r_dplr: I
        garant: '–'
        delegat: '–'
        nukib: '–'
        ucl: '–'
      - activity: Hlášení NÚKIB / ÚCL
        l1_its: '–'
        koordinator: R
        cirt: C
        r_dtech: '–'
        r_dplr: '–'
        garant: '–'
        delegat: '–'
        nukib: I (Vysoká/Kritická)
        ucl: I (Vysoká/Kritická)
      - activity: Klasifikace a uzavření
        l1_its: '–'
        koordinator: R, A
        cirt: C
        r_dtech: I (Vysoká/Kritická)
        r_dplr: '–'
        garant: I
        delegat: '–'
        nukib: '–'
        ucl: '–'
