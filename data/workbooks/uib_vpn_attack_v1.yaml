# UIB – PLAYBOOK CSIRT: ÚTOK NA VPN / REMOTE ACCESS THREAT – v1.0
# Zpracováno dle CSIRT Playbook Útok na VPN v1.2 / SM/25/0100/P5
# Terminologie a postup odpovídají interním playbookům CSIRT.
# Poznámka: tento workbook pokrývá neoprávněný přístup přes VPN (brute-force, zranitelnost, lateral movement).
# Volumetrické DDoS útoky na VPN infrastrukturu řeší workbook ddos_vpn_v1 (DDoS útok na VPN).

template_id: uib-vpn-attack-v1
name: 'Útok na VPN / Remote Access Threat'
version: '1.0'
category: Network
status: active
description: >
  Workbook pro řešení incidentů typu útok na VPN a vzdálený přístup – brute-force a credential stuffing,
  přihlášení z podezřelých lokalit nebo anonymizérů, zneužití zranitelnosti VPN zařízení,
  neoprávněné vzdálené přístupy a post-kompromitační laterální pohyb po úspěšném VPN přihlášení.
  Nepokrývá volumetrické DDoS útoky (viz workbook ddos_vpn_v1).
  L1 ITS provádí pouze příjem UIB/IIB, evidenci v TIS a okamžité předání Koordinátorovi CSIRT (L2).
  Zpracováno dle CSIRT Playbook Útok na VPN v1.2 a SM/25/0100/P5.
mitre_tactic: Initial Access
mitre_technique: T1133 – External Remote Services
mitre_subtechnique: T1110.003
data_sources:
  - VPN gateway logy (Cisco ASA / FortiGate / Palo Alto / jiný)
  - Firewall / NGFW logy
  - AAD / Azure AD sign-in logy
  - Active Directory Event Log (4624, 4625, 4648, 4768, 4769)
  - SIEM
  - IPS / IDS
  - NetFlow / sFlow (síťová analýza post-VPN)

sections:

  - id: header
    type: workbook_header
    title: Hlavička
    fields:
      - key: case_title
        label: Stručný popis události
        hint: Výstižný popis pro odlišení od ostatních případů stejné šablony
        example: 'VPN brute-force – 4 800 neúspěšných pokusů z RU/CN IP za 2 h · 1 úspěšné přihlášení – servisní účet svc-backup'
      - {key: last_saved, label: Datum poslední aktualizace UIB, editable: false, auto_value: last_saved}
      - key: incident_coordinator
        label: Koordinátor incidentu (CSIRT – L2)
        hint: Koordinátor CSIRT přebírá řízení od L1 ITS – vyplní se tlačítkem Převzít.

  - id: classification
    type: classification
    title: Klasifikace
    fields:
      - {key: mitre_tactic, label: MITRE Tactic, editable: false, auto_value: template_mitre_tactic}
      - {key: mitre_technique, label: MITRE Technique, editable: false, auto_value: template_mitre_technique}
      - key: mitre_subtechnique
        label: MITRE Sub-technique / Typ útoku
        type: select
        options:
          - T1110.001 – Password Guessing (cílený útok na konkrétní účty)
          - T1110.003 – Password Spraying (útok slabým heslem na velký počet účtů)
          - T1110.004 – Credential Stuffing (zneužití uniklých přihlašovacích údajů)
          - T1133 – External Remote Services (neoprávněné přihlášení přes VPN)
          - T1190 – Exploit Public-Facing Application (zneužití zranitelnosti VPN zařízení)
          - T1078 – Valid Accounts (úspěšná kompromitace účtu → VPN přihlášení)
          - T1021 – Remote Services (lateral movement po VPN přihlášení)
          - Kombinace / nelze určit
        hint: >
          Vyplň po Posouzení, až je znám typ útoku.
          Zneužití zranitelnosti VPN zařízení (T1190) nebo privilegovaný účet → ihned eskaluj na P1/P2 a aktivuj L3/S1.
      - {key: data_sources, label: Doporučené zdroje dat pro investigaci, editable: false, auto_value: template_data_sources}

  - id: contacts
