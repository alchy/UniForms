        communication_method: Datová schránka
        sla: 'Dle regulatorní povinnosti (NIS2 – KBI při zasažení reg. infrastruktury nebo CVE exploit)'
        note: null

  - id: closure
    title: Klasifikace a uzavření
    type: form
    description: >
      Uzavření provádí Koordinátor CSIRT po ověření integrity VPN infrastruktury, čistoty účtů a dokončení Odezvy,
      nebo ihned po Posouzení u False Positive. Garant aktiva schvaluje ukončení. Koordinátor uzavírá záznam v TIS.
    hint: >
      Před uzavřením ověř: (1) VPN infrastruktura je funkční a bez kompromitace, (2) dotčené účty
      mají resetovaná hesla a MFA, (3) žádné aktivní sessions útočníka, (4) dočasné blokace jsou
      zrušeny nebo ponechány dle doporučení, (5) logy 48–72 h zpět jsou analyzovány,
      (6) garant aktiva schválil ukončení, (7) důkazy uloženy v IKB.<br><br>
      <b>Metodika klasifikace – Úroveň dopadu:</b><br>
      <b>Nízká</b> – pouze neúspěšné pokusy, bez úspěšného přihlášení, žádný dopad na regulovanou službu.<br>
      <b>Střední</b> – úspěšné přihlášení běžného uživatele bez laterálního pohybu nebo exfiltrace.<br>
      <b>Vysoká</b> – privilegovaný účet nebo lateral movement; při zasažení reg. infrastruktury splňuje KBI dle ZKB.<br>
      <b>Kritická</b> – zranitelnost VPN zařízení nebo APT s rozsáhlým dopadem; zasažena reg. infrastruktura; vždy KBI.
    fields:
      - key: final_classification
        label: Klasifikace výsledku
        type: select
        options:
          - True Positive
          - False Positive
          - Benign True Positive
        hint: 'False Positive: neúspěšné pokusy byly legitimní testování nebo síťový šum.'
        example: True Positive
      - key: impact_level
        label: Úroveň dopadu
        type: select
        options:
          - Nízká
          - Střední
          - Vysoká
          - Kritická
        option_hints:
          Nízká: Pouze neúspěšné pokusy, bez úspěšného přihlášení. Žádný dopad na regulovanou službu.
          Střední: Úspěšné přihlášení běžného uživatele bez laterálního pohybu nebo exfiltrace.
          Vysoká: Privilegovaný účet nebo lateral movement. Při zasažení reg. infrastruktury splňuje KBI dle ZKB.
          Kritická: Zneužití CVE nebo APT s rozsáhlým dopadem. Zasažena regulovaná infrastruktura. Vždy KBI.
        hint: Úroveň Vysoká a Kritická při zasažení regulované infrastruktury zakládají povinnost hlášení NÚKIB a ÚCL.
      - key: nukib_notification_required
        label: Povinnost hlášení NÚKIB
        type: select
        options:
          - 'Povinná – Regulovaná služba + Vysoká/Kritická (ZOKB §8, vyhl. 82/2018 Sb.)'
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: 'Lhůty: do 24 h (první hlášení) · do 72 h (detailní hlášení) · do 30 dní (závěrečná zpráva) – dle vyhlášky č. 82/2018 Sb.'
      - key: ucl_notification_required
        label: Povinnost hlášení ÚCL
        type: select
        options:
          - Povinná – Regulovaná letecká služba + Vysoká/Kritická
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: ÚCL (Úřad pro civilní letectví) – hlášení povinné při Vysokém nebo Kritickém dopadu na regulovanou leteckou službu.
      - key: impact_primary_service
        label: Dostupnost primárních služeb organizace
        type: select
        options:
          - Zcela nedostupné
          - Částečně nedostupné / degradované
          - Dostupné bez omezení
          - Netýká se
        hint: Primární = služby poskytované organizací klientům / uživatelům nebo klíčové interní provozní procesy.
      - key: impact_scope
        label: Rozsah zasažených uživatelů / systémů
        type: select
        options:
          - 'Celoplošný (> 50 % uživatelů nebo klíčových systémů)'
          - Významný (10–50 %)
          - 'Omezený (< 10 %)'
          - Individuální (1 uživatel / 1 systém)
      - key: impact_duration
        label: Doba výpadku / narušení (dostupnost)
        type: select
        options:
          - '> 4 hodiny'
          - 1–4 hodiny
          - 15 min – 1 hodina
          - < 15 min
          - Žádný výpadek / narušení
      - key: impact_data
        label: Dopad na data (důvěrnost / integrita)
        type: select
        options:
          - Exfiltrace dat potvrzena
          - Neoprávněný přístup k datům potvrzen
          - Integrita dat narušena
          - Žádný dopad na data
          - Nelze určit
      - key: attack_type_final
        label: Typ útoku (finální)
        type: select
        options:
          - Brute-force (cílené opakované pokusy)
          - Password spraying (T1110.003)
          - Credential stuffing (T1110.004)
          - Úspěšné přihlášení – kompromitace účtu (T1078)
          - Zneužití zranitelnosti VPN zařízení (T1190)
          - Lateral movement po VPN přihlášení (T1021)
          - Kombinace typů
          - Nelze určit
      - key: successful_access_confirmed
        label: Úspěšné přihlášení útočníkem potvrzeno
        type: select
        options:
          - Ano – přihlášení a aktivita v síti potvrzena
          - Ano – přihlášení potvrzeno, žádná aktivita v síti
          - Ne – pouze neúspěšné pokusy
      - key: vpn_infrastructure_integrity
        label: Integrita VPN infrastruktury ověřena
        type: select
        options:
          - Ano – žádné kompromitace zařízení, firmware a konfigurace čistá
          - Ano – po aplikaci patchů / mitigací
          - Ne – stále vyšetřováno
        hint: Před uzavřením musí být integrita VPN infrastruktury potvrzena.
      - key: root_cause
        label: Root Cause
        type: textarea
        example: >
          Credential stuffing útok využil uniklé přihlašovací údaje z veřejné databáze (HIBP).
          Servisní účet svc-backup neměl MFA a používal slabé heslo.
          Útočník se přihlásil přes VPN a stáhl 3 soubory z HR sdíleného disku před detekcí.
      - key: actions_taken
        label: Popis přijatých opatření
        type: textarea
        example: >
          Odpojení VPN session · geo-blocking RU/CN/UA · reset hesel 38 cílených účtů ·
          MFA vynuceno na VPN pro servisní účty · lockout politika aktivována · logy uloženy do IKB
      - key: recommendations
        label: Doporučení pro zlepšení
        type: textarea
        example: >
          Zavést phishing-resistant MFA (certifikát / FIDO2) pro VPN přihlašování servisních účtů.
          Pravidelná rotace hesel servisních účtů. Monitorovat VPN přihlášení servisních účtů v SIEM.
          Ověřit firmware VPN zařízení proti aktuálním CVE v rámci vulnerability managementu.
      - key: related_service_requests
        label: Související servisní požadavky
        type: textarea
        hint: Čísla nebo odkazy na servisní požadavky (MFA konfigurace VPN, lockout politika, FW pravidla, patch VPN GW apod.)
        example: 'SR-2026-1200 – MFA enforcement VPN · SR-2026-1201 – lockout politika VPN · SR-2026-1202 – patch Cisco ASA'
      - key: related_security_events
        label: Navázané bezpečnostní události (UIB/IIB)
        type: textarea
        hint: >
          Reference na další šetřené bezpečnostní události otevřené v rámci nebo v souvislosti s tímto incidentem
          (kompromitace účtu, malware na zařízení uživatele, phishingový e-mail jako vektor apod.)
        example: 'UIB-10032026-1400-XXXX – Kompromitace účtu svc-backup (paralelně) · UIB-10032026-1455-YYYY – Malware lateral movement'
      - key: reporter_notified
        label: Oznamovatel informován
        type: select
        options:
          - Ano
          - Ne
      - {key: closed_at, label: Datum uzavření, type: datetime}

  - id: raci
    title: RACI matice
    type: raci_table
    legend: >
      R = Responsible (provádí) · A = Accountable (zodpovídá za výsledek) ·
      C = Consulted (poskytuje součinnost) · I = Informed (je informován) ·
      (Vysoká/Kritická) = podmínka pro aktivaci role
    columns:
      - activity
      - l1_its
      - koordinator
      - cirt
      - r_dtech
      - r_dplr
      - garant
      - delegat
      - dpo
      - nukib
