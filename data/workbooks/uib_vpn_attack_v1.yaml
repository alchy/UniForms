  - id: incident_context
    title: 'Detekce a hlášení (L1 ITS)'
    type: section_group
    subsections:
      - id: reported_by_person
        title: Hlášeno zaměstnancem / osobou
        type: form
        note: 'L1 ITS – záznam dle SM/25/0100/P5'
        condition: source_type == 'person'
        fields:
          - {key: reported_at, label: Datum a čas nahlášení (UIB/IIB), type: datetime, example: '2026-03-10T14:05'}
          - {key: reporter_name, label: Jméno oznamovatele, example: Petr Marek}
          - {key: reporter_department, label: Oddělení / organizační jednotka, example: Správa sítí}
          - {key: reporter_contact, label: Kontakt (e-mail / telefon), example: 'marek@firma.cz / +420 XXX XXX XXX'}
          - key: description_by_reporter
            label: Popis události slovy oznamovatele
            type: textarea
            example: >
              SIEM vyhlásil alert na masivní počet neúspěšných VPN přihlášení ze zahraničních IP adres.
              Ve VPN logu vidím tisíce pokusů za poslední hodinu. Jeden účet se zdá, že se přihlásil úspěšně.
      - id: automated_detection
        title: Automatizovaná detekce
        type: form
        note: 'L1 ITS – záznam dle SM/25/0100/P5'
        condition: source_type == 'automated'
        fields:
          - {key: alert_timestamp, label: Datum a čas alertu, type: datetime, example: '2026-03-10T13:58'}
          - {key: detection_tool, label: Detekční nástroj / zdroj alertu, example: 'SIEM – pravidlo VPN_BRUTEFORCE_THRESHOLD (>500 failed/h)'}
          - {key: alert_id, label: ID alertu / Identifikace pravidla}
          - {key: affected_asset_auto, label: 'Postižené aktivum (VPN GW hostname / IP)', example: 'vpn-gw.firma.cz · 203.0.113.10'}
          - key: alert_description
            label: Popis alertu
            type: textarea
            example: >
              4 820 neúspěšných pokusů o VPN přihlášení za 2 hodiny ze zdrojových IP v RU, CN a UA.
              1 úspěšné přihlášení servisního účtu svc-backup z IP 185.xxx.xxx.xxx (RU) v 13:47.
      - id: affected_assets
        title: Dotčená aktiva
        type: assets_table
        note: 'Průběžně doplňuj při každém rozšíření scope'
        hint: >
          Pokud je VPN brána nebo infrastruktura za ní součástí regulované služby → ihned informuj CISO.<br><br>
          Do pole Poznámky uveď klíčová zjištění (zdrojové IP, dotčený účet, stav VPN session, CVE číslo).
        always_expanded: true
        columns:
          - asset_name
          - fqdn
          - asset_ip
          - asset_type
          - regulated_service
          - notes
        column_labels:
          asset_name: Název aktiva
          fqdn: FQDN
          asset_ip: IP / Netmask
          asset_type: Typ aktiva
          regulated_service: Regulovaná služba
          notes: Poznámky
        column_options:
          asset_type:
            - VPN brána
            - Firewall / NGFW
            - Síťový prvek
            - Server
            - Endpoint
            - Informační systém
            - Jiné aktivum
          regulated_service:
            - Ne
            - Ano
        editable: true
        rows: []

  - id: l2_assessment
    title: 'Prvotní posouzení koordinátora (CSIRT – L2)'
    type: section_group
    subsections:
      - id: l2_initial_assessment
        title: Prvotní posouzení Koordinátora CSIRT (L2)
        type: form
        note: Vyplní Koordinátor CSIRT ihned po převzetí od L1 – před zahájením Posouzení, třídění a rozhodování
        fields:
          - key: attack_type_initial
            label: Předpokládaný typ útoku (předběžně)
            type: select
            options:
              - Brute-force / password spraying (masivní neúspěšné pokusy)
              - Credential stuffing (zneužití uniklých přihlašovacích údajů)
              - Úspěšné přihlášení – podezření na kompromitaci účtu
              - Zneužití zranitelnosti VPN zařízení (CVE)
              - Lateral movement po úspěšném VPN přihlášení
              - Přihlášení z podezřelé lokality / anonymizéru
              - Nelze určit – vyžaduje analýzu
            hint: >
              Zneužití zranitelnosti VPN zařízení → ihned aktivuj L3/S1 a eskaluj MKB / CISO.
              Úspěšné přihlášení privilegovaného účtu → P1/P2.
          - key: successful_login_confirmed
            label: Bylo potvrzeno úspěšné přihlášení útočníkem?
            type: select
            options:
              - Ano – úspěšné přihlášení potvrzeno
              - Podezření – nutno ověřit v logu
              - Ne – pouze neúspěšné pokusy
            hint: >
              Úspěšné přihlášení → okamžitá stabilizace (odpojení session, reset hesla, MFA, revokace tokenů)
              a zahaj paralelně postup dle workbooku Kompromitace účtu (uib-account-compromise-v1).
          - key: l2_initial_priority
            label: Předběžná priorita (L2)
            type: select
            options:
              - P1 – Kritická (zranitelnost VPN zařízení / privilegovaný účet / reg. infrastruktura)
              - P2 – Vysoká (úspěšné přihlášení admin účtu / lateral movement)
              - P3 – Střední (úspěšné přihlášení běžného uživatele / podezřelá aktivita)
              - P4 – Nízká (pouze neúspěšné pokusy, žádné úspěšné přihlášení)
            hint: Předběžná priorita se může upřesnit v průběhu Posouzení.

  - id: triage_investigation
    title: Posouzení, třídění a rozhodování
    type: checklist
    description: >
      Cílem je potvrdit nebo vyvrátit útok na VPN, identifikovat typ útoku a posoudit KBU/KBI.
      Koordinátor CSIRT (L2) přebírá řízení od L1 ITS a aktivuje CSIRT analytiky a administrátory.
    step_groups:
      - id: validate_alert
        title: Validace alertu a KBU/KBI posouzení (Koordinátor CSIRT – L2)
        steps:
          - action: >
              Validuj alert jako relevantní VPN událost: ověř počet neúspěšných pokusů, časové okno,
              zdrojové IP a zda jsou to skutečné VPN pokusy (ne síťový šum nebo scanner)
            example: '4 820 failed loginů za 2 h · zdrojové IP: RU, CN, UA · VPN GW logy potvrzují cílené pokusy'
          - action: >
              Zjisti a zaznamenej do Prvotního posouzení: bylo potvrzeno úspěšné přihlášení?
              Jaký typ účtu? (běžný uživatel / admin / servisní účet)
            example: '1 úspěšné přihlášení: svc-backup (servisní účet) z IP 185.xxx.xxx.xxx v 13:47 · přihlášení neobvyklé'
          - action: >
              Urči dopad a prioritu:
              běžný uživatelský účet → P3/P4 ·
              admin nebo privilegovaný účet → P2/P1 ·
              zasažená VPN infrastruktura (zranitelnost CVE) → P1/P2
            example: 'Servisní účet s širokými oprávněními → eskalace na P2 · CISO informován'
          - action: >
              Posouď možnost KBU/KBI dle SM/25/0100/P5 –
              KBI pokud je zasažena infrastruktura regulované služby nebo VPN je její součástí
            example: 'VPN GW není v registru regulovaných aktiv · KBI: Ne – sledovat při rozšíření scope'
          - action: >
              Aktivuj příslušné role: CSIRT analytici, Správce VPN, Správce sítě / FW,
              Správce IAM – dle typu a závažnosti útoku
            example: 'CSIRT analytici aktivováni v 14:10 · Správce VPN a Správce sítě kontaktováni'
        hints:
          - >
            Typické indikátory útoku na VPN: masivní neúspěšné pokusy (brute-force, spraying) ·
            přihlášení z neobvyklých lokalit nebo anonymizérů · přihlášení servisními nebo admin účty
            které VPN běžně nepoužívají · paralelní relace z více zemí ·
            korelace s veřejnými CVE a vendor advisories · laterální pohyb po přihlášení.

  - id: response_technical
    title: 'Odezva – technická opatření (CSIRT + TA/MA)'
    type: checklist
    description: >
      Technická odezva dle playbooku. Koordinátor CSIRT řídí průběh a zadává pokyny administrátorům.
    step_groups:
      - id: immediate_stabilization
        title: A) Okamžitá stabilizace (Koordinátor CSIRT + Správce VPN + Správce sítě)
        steps:
          - action: >
              Odpoj aktivní VPN session podezřelého účtu nebo zdrojové IP –
              provádí Správce VPN na pokyn Koordinátora CSIRT
            example: 'VPN session svc-backup z IP 185.xxx.xxx.xxx odpojena v 14:15'
          - action: >
              Dočasně zablokuj zdrojové IP adresy nebo ASN / geografické regiony s nejvyšším objemem
              útoků na hraničním FW – provádí Správce sítě / FW na pokyn Koordinátora CSIRT
            example: 'Geo-blocking RU, UA, CN aktivován na hraničním FW · top 5 ASN bloků přidáno do blocklist'
          - action: >
              Omezte nebo pozastavte problematický VPN profil / skupinu pokud útok pokračuje –
              provádí Správce VPN na pokyn Koordinátora CSIRT
            example: 'VPN profil servisních účtů dočasně deaktivován do dokončení analýzy'
          - action: >
              Ověř aktuální stav a dostupnost VPN infrastruktury –
              validuj VPN GW dostupnost pro legitimní uživatele po provedení opatření
            example: 'VPN GW dostupná · legitimní uživatelé se mohou připojit · CPU a konekce v normálním rozsahu'
        hints:
          - >
            Dočasné blokace provádět cíleně – příliš agresivní geo-blocking může omezit
            legitimní uživatele v zahraničí. Ověř v NetFlow přítomnost legitimního provozu před blokací.

      - id: vpn_log_analysis
        title: B1) Analýza VPN logů (CSIRT analytici + Správce VPN)
        steps:
          - action: >
              Analyzuj VPN logy: IP adresy, User-Agent / klientský fingerprint, geolokace,
              časové vzory pokusů, cílené účty, úspěšnost přihlášení
            example: 'Top zdrojové ASN: AS12345 (RU, 2 100 pokusů) · AS67890 (CN, 1 400 pokusů) · cíleno 38 různých účtů'
          - action: >
              Ověř ASN, geolokaci a reputaci top zdrojových IP/ASN –
              odhadni, zda jde o botnet, TOR exit nodes nebo komerční VPN / proxy
            example: 'IP reputace: Talos – Poor, AbuseIPDB – 312 hlášení · TOR exit node potvrzen u 3 IP'
          - action: >
              Identifikuj všechna úspěšná přihlášení v časovém okně útoku –
              zaznamenej účet, čas, IP, geolokaci, délku session a aktivity po přihlášení
            example: '2 úspěšná přihlášení: svc-backup (13:47) a jnovak (13:52) z různých RU IP'
          - action: >
              Ověř, zda nedošlo ke změnám konfigurace VPN gateway v okně útoku –
              porovnej aktuální konfiguraci se zálohou
            example: 'Konfigurace VPN GW nezměněna · porovnání se zálohou z 2026-03-09: identická'
          - action: >
              Koreluj VPN logy se SIEM alertami – ověř, zda byl útok detekován dalšími bezpečnostními
              nástroji (IPS, AAD Identity Protection, EDR)
            example: 'SIEM: IPS rate-limit pravidlo spuštěno ve 13:45 · AAD: Risk event Medium pro jnovak'
        classification_hints:
          - >
            Masivní neúspěšné pokusy bez úspěšného přihlášení → True Positive, Low/Medium ·
            Úspěšné přihlášení z anomálního zdroje → True Positive, High ·
            Úspěšné přihlášení + aktivita v síti → True Positive, High/Critical

      - id: account_audit
        title: B2) Audit dotčených účtů (při úspěšném přihlášení)
        note: Přeskoč pokud nebyla potvrzena žádná úspěšná přihlášení
        steps:
          - action: >
              Pro každý úspěšně přihlášený účet: ověř AAD sign-in log, rizikové události,
              stav MFA a historii přihlášení – koreluj s workbookem Kompromitace účtu
            example: 'svc-backup: žádné MFA · přihlašování přes VPN neobvyklé · poslední přihlášení před 6 měsíci'
          - action: >
              Nařiď okamžitý reset hesla, MFA a revokaci sessions a tokenů pro dotčené účty –
              provádí Správce IAM na pokyn Koordinátora CSIRT
            example: 'Reset hesla svc-backup a jnovak proveden v 14:20 · sessions revokována · MFA vynuceno'
          - action: >
              Zkontroluj skupiny, role a oprávnění dotčených účtů –
              ověř, zda útočník nespustil žádné akce nebo nezměnil oprávnění
            example: 'svc-backup: přístup k file serveru FS-01 a zálohovacímu systému · žádné změny oprávnění'
          - action: >
              Zahaj paralelní postup dle workbooku Kompromitace účtu (uib-account-compromise-v1)
              pro podrobnou analýzu aktivity kompromitovaného účtu
            example: 'Workbook Kompromitace účtu aktivován pro svc-backup a jnovak'

      - id: network_analysis
        title: B3) Síťová analýza – aktivity po VPN přihlášení
        note: Přeskoč pokud nebylo potvrzeno úspěšné přihlášení
        steps:
          - action: >
              Analyzuj síťový provoz z IP adresy útočníka po VPN přihlášení:
              cílové systémy, porty, protokoly, objem dat – využij NetFlow / SIEM
            example: 'Post-VPN provoz: RDP na FS-01 (445/TCP) · 3,2 MB přeneseno na IP útočníka před odpojením'
          - action: >
              Zkontroluj pokusy o laterální pohyb: RDP, SMB, SSH, WinRM spojení ze zasaženého
              účtu nebo IP na interní systémy v relevantním časovém okně
            example: 'SMB sken na 3 servery v segmentu 192.168.10.0/24 potvrzen z VPN IP útočníka'
          - action: >
              Ověř, zda došlo k exfiltraci dat – objem přeneseného provozu ven ze sítě přes VPN
            example: 'Odchozí VPN provoz: 3,2 MB · typ souborů neznámý · DPO informován jako preventivní opatření'
          - action: >
              Pokud laterální pohyb nebo exfiltrace potvrzeny → eskaluj prioritu a zvaž
              síťovou segmentaci nebo izolaci zasaženého segmentu
            example: 'Laterální pohyb potvrzen → eskalace na P1 · CISO informován · izolace segmentu nařízena'
        hints:
          - >
            Laterální pohyb po VPN přihlášení je indikátorem cíleného útoku (APT) –
            při podezření aktivuj L3/S1 a zvaž krizový režim.

      - id: vulnerability_check
        title: B4) Ověření zranitelností VPN zařízení
        note: Přeskoč pokud útok byl čistě brute-force bez indikátorů zneužití zranitelnosti
        steps:
          - action: >
              Porovnej verzi firmware a software VPN gateway s aktuálními CVE a vendor advisories –
              kontaktuj Správce VPN pro ověření verze a stavu patchů
            example: 'Cisco ASA verze 9.14.x · CVE-2024-XXXX: kritická zranitelnost pre-auth RCE – relevantní!'
          - action: >
              Zkontroluj integritu konfigurace VPN zařízení – anomální pravidla, backdoor účty,
              neobvyklé tunely nebo NAT pravidla
            example: 'Konfigurace ověřena – žádná anomální pravidla · žádné neznámé lokální účty'
          - action: >
              Při potvrzené nebo podezřelé zranitelnosti: okamžitě omezte nebo izolujte VPN zařízení,
              aplikujte dostupné mitigace nebo patch – aktivuj L3/S1 a informuj MKB / CISO
            example: 'CVE potvrzena → patch aplikován v 15:30 · L3 aktivován · MKB / CISO informováni'
          - action: >
              Proveď forenzní kontrolu integrity VPN zařízení – ověř systémové logy, autentizační záznamy
              a procesy zařízení na přítomnost backdooru nebo persistentního přístupu útočníka
            example: 'Forenzní kontrola Cisco ASA: žádný backdoor účet · syslog čistý · integrita potvrzena'
        hints:
          - >
            Zneužití zranitelnosti VPN zařízení (T1190) je vždy P1/P2 a zakládá posouzení KBI.
            Vendor advisory zveřejněné v době incidentu = červená vlajka – ověřit okamžitě.

      - id: attack_type_brute_force
        title: C1) Brute-force / Password spraying
        note: Přeskoč pokud byl identifikován jiný primární typ útoku
        steps:
          - action: >
              Identifikuj cílené účty – jak mnoho účtů bylo cíleno, jaký vzor (slabá hesla,
              výchozí hesla, slovníkový útok) – analyzuj vzor neúspěšných pokusů
            example: '38 účtů cíleno · vzor: slovníkový útok + jméno.prijmeni@firma.cz formát'
          - action: >
              Ověř a zaveď nebo zpřísni lockout politiku na VPN pro dotčené účty –
              koordinuje Správce VPN a Správce IAM
            example: 'Lockout po 5 neúspěšných pokusech aktivován pro VPN profil · dříve neomezeno'
          - action: >
              Nařiď reset hesel všech cílených účtů a vynucení silného hesla –
              provádí Správce IAM na pokyn Koordinátora CSIRT
            example: 'Reset hesel 38 cílených účtů nařízeno · průběh: 22/38 dokončeno'
          - action: >
              Ověř a vynuť MFA pro VPN přístup u všech dotčených účtů – pokud MFA dosud není
              na VPN vynuceno → doporučení k zavedení jako nápravné opatření
            example: 'MFA na VPN: aktivní pro 85 % uživatelů · servisní účty bez MFA → svc-backup kompromitován'
        classification_hints:
          - >
            Brute-force bez úspěšného přihlášení → True Positive, Low/Medium ·
            Brute-force + úspěšné přihlášení → True Positive, High

      - id: attack_type_account_compromise
        title: C2) Úspěšná kompromitace účtu → VPN přihlášení
        note: Přeskoč pokud nebylo potvrzeno úspěšné přihlášení útočníkem
        steps:
          - action: >
              Ověř dle workbooku Kompromitace účtu (uib-account-compromise-v1):
              zda byl účet kompromitován před VPN incidentem (phishing, credential reuse, malware)
            example: 'Korelace: jnovak otevřel phishingový e-mail 3 h před VPN přihlášením → pravděpodobný vektor'
          - action: >
              Analyzuj veškeré přístupy provedené útočníkem po VPN přihlášení:
              cílené systémy, soubory, databáze, administrátorské akce
            example: 'Útočník přistoupil k FS-01 (HR sdílený disk) · 3 soubory staženy · jiné systémy nedotčeny'
          - action: >
              Zkontroluj audit log certifikátů a autentizačních modulů VPN –
              ověř, zda nebyly manipulovány nebo přidány nové certifikáty
            example: 'Certifikáty VPN ověřeny – žádné nové nebo neznámé certifikáty'

      - id: attack_type_vuln_exploitation
        title: C3) Zneužití zranitelnosti VPN zařízení
        note: Přeskoč pokud nebyla identifikována zranitelnost VPN zařízení
        steps:
          - action: >
              Okamžitě aktivuj L3/S1 a eskaluj MKB / CISO –
              zneužití zranitelnosti VPN je vždy P1/P2 a potenciální KBI
            example: 'L3 aktivován v 14:30 · CISO informován · ŘDTECH notifikován'
          - action: >
              Proveď okamžitou mitigaci nebo patch dle vendor advisory –
              koordinuje Správce VPN a Správce sítě
            example: 'Vendor workaround aplikován (disable webVPN) · patch v 15:30 dokončen'
          - action: >
              Zkontroluj, zda útočník nezanechal perzistentní přístup (backdoor, nový admin účet,
              modifikovaný firmware, implant) – forenzní kontrola VPN zařízení
            example: 'Forenzní kontrola: žádný backdoor · firmware hash ověřen · integrita potvrzena'
          - action: >
              Posouď KBI dle SM/25/0100/P5 – při zasažení VPN infrastruktury regulované služby
              je hlášení NÚKIB pravděpodobně povinné
            example: 'KBI posouzení: VPN slouží jako vstupní bod pro regulovanou infrastrukturu → KBI pravděpodobné · CSIRT eskaluje MKB'

      - id: attack_type_lateral
        title: C4) Podezření na pokročilého aktéra – lateral movement
        note: Přeskoč pokud nebyl identifikován laterální pohyb nebo APT indikátory
        steps:
          - action: >
              Analyzuj SIEM a EDR pro RDP, SMB, SSH, WinRM aktivity ze zdrojů útočníka
              na interní systémy v celém časovém okně útoku (rozšiř zpět minimálně 7 dní)
            example: 'EDR: SMB přístupy z IP útočníka na 5 serverů · powershell.exe spuštěn na DC-01 · APT indikátor'
          - action: >
              Uzavři postižené síťové segmenty – nařiď Správci sítě síťovou segmentaci nebo
              izolaci dotčených zařízení
            example: 'Segment 192.168.10.0/24 izolován · postižené servery odpojeny od sítě'
          - action: >
              Aktivuj krizový režim: P1/P2, CISO, ŘDTECH, L3/S1 –
              rozsah vyžaduje koordinaci nad rámec standardního L2 postupu
            example: 'Krizový režim aktivován · CISO a ŘDTECH přítomni · L3 CSIRT tým zapojen'
          - action: >
              Zaznamenej veškeré IOC a TTP útočníka (IP, user-agenty, hashe nástrojů, C2 domény)
              do TIS a IKB jako podklad pro threat hunting a NÚKIB hlášení
            example: 'IOC uloženy do IKB: /VPNAttack-2026-XXX/ioc_apt.txt · sdíleno s TI platformou'

      - id: evidence_collection
        title: Zajištění důkazů – uložení do IKB
        steps:
          - action: >
              Exportuj a ulož do IKB: VPN GW logy, firewall logy, IPS logy,
              NetFlow data a SIEM záznamy z relevantního časového okna (minimálně 48 h zpět)
            example: 'Logy uloženy do IKB: /VPNAttack-2026-XXX/logs/ · VPN logy + SIEM · 48 h okno'
          - action: >
              Ulož seznam zdrojových IP, ASN a geolokací útočníků –
              jako podklad pro blokace a sdílení s TI platformou
            example: 'IOC seznam: /VPNAttack-2026-XXX/ioc_list.txt · 247 zdrojových IP · top 5 ASN'
          - action: >
              Zdokumentuj všechny provedené stabilizační kroky s časovými razítky v TIS
            example: 'TIS záznam UIB-XXXXXX: odpojení session 14:15 · geo-blocking 14:18 · reset hesel 14:20'

  - id: containment_remediation
    title: 'Odezva – checklist'
    type: action_table
    description: >
      Zaznamenej u každé akce zodpovědnou roli a aktuální stav. Pokud akce není relevantní, napiš N/A.
      Technické zásahy provádí administrátoři výhradně na pokyn Koordinátora CSIRT.
    columns:
      - phase
      - action
      - responsible_role
      - cooperation
      - status
    column_labels:
      phase: Fáze
      action: Akce
      responsible_role: Zodpovědná role
      cooperation: Součinnost
      status: Stav
    status_options:
      - Provedeno
      - Probíhá
      - Čeká
      - N/A
      - Není nutné provést
    editable_columns:
      - status
    allow_append: false
    rows:
      - phase: A
        action: Odpojení aktivních VPN sessions útočníka
        responsible_role: Správce VPN
        cooperation: Koordinátor CSIRT
        status: null
      - phase: A
        action: Blokace zdrojových IP/ASN útočníka na hraničním FW
        responsible_role: Správce sítě / FW
        cooperation: CSIRT analytici
        status: null
      - phase: A
        action: Geo-blocking zdrojových regionů / zemí (bez legitimního provozu organizace)
        responsible_role: Správce sítě / FW
        cooperation: Správce IPS · CSIRT analytici
        status: null
      - phase: A
        action: Dočasná deaktivace nebo omezení VPN profilu / skupiny (pokud útok pokračuje)
        responsible_role: Správce VPN
        cooperation: Koordinátor CSIRT
        status: null
      - phase: B
        action: Analýza VPN logů – identifikace úspěšných přihlášení, vzorů, IOC
        responsible_role: CSIRT analytici
        cooperation: Správce VPN
        status: null
      - phase: B
        action: Reset hesel a MFA dotčených / cílených VPN účtů – vynucení MFA na VPN
        responsible_role: Správce identity / IAM
        cooperation: Koordinátor CSIRT
        status: null
      - phase: B
        action: Revokace sessions a tokenů kompromitovaných účtů
        responsible_role: Správce identity / IAM
        cooperation: CSIRT analytici
        status: null
      - phase: B
        action: Aktivace lockout politiky na VPN (pokud dosud neaktivní)
        responsible_role: Správce VPN
        cooperation: Správce identity / IAM
        status: null
      - phase: B
        action: Síťová segmentace nebo izolace zasaženého segmentu (při lateral movement)
        responsible_role: Správce sítě / FW
        cooperation: Koordinátor CSIRT
        status: null
      - phase: B
        action: Aplikace patchů nebo mitigací dle CVE na VPN zařízení
        responsible_role: Správce VPN
        cooperation: CSIRT analytici
        status: null
      - phase: '–'
        action: Uložení důkazů (logy, IOC, konfigurace) do IKB
        responsible_role: CSIRT analytici
        cooperation: Správce VPN · Správce sítě / FW
        status: null
      - phase: '–'
        action: Monitoring VPN aktivity po obnově – 48–72 h sledování anomálií
        responsible_role: CSIRT analytici
        cooperation: Správce VPN
        status: null
      - phase: '–'
        action: Informování dotčených uživatelů – instrukce k novému heslu a MFA
        responsible_role: Koordinátor CSIRT
        cooperation: '–'
        status: null

