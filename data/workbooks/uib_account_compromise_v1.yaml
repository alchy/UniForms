  - id: closure
    title: Klasifikace a uzavření
    type: form
    description: >
      Uzavření provádí Koordinátor CSIRT po ověření čistoty prostředí a dokončení Odezvy,
      nebo ihned po Posouzení u False Positive. Garant aktiva schvaluje ukončení pokud relevantní.
      Koordinátor uzavírá záznam v TIS.
    hint: >
      Před uzavřením ověř: (1) žádné aktivní sessions útočníka, (2) žádná forwarding pravidla ani
      OAuth aplikace útočníka, (3) žádné neoprávněné odesílání nebo sdílení, (4) MFA re-enrollment
      dokončen, (5) důkazy uloženy v IKB, (6) DPO informován pokud relevantní.<br><br>
      <b>Metodika klasifikace – Úroveň dopadu:</b><br>
      <b>Nízká</b> – neobvyklé přihlášení bez potvrzené aktivity útočníka; žádný dopad na regulovanou službu.<br>
      <b>Střední</b> – potvrzená kompromitace běžného uživatele; bez exfiltrace; bez dopadu na regulovanou službu.<br>
      <b>Vysoká</b> – exfiltrace dat nebo privilegovaný účet; při zasažení reg. služby splňuje KBI dle ZKB.<br>
      <b>Kritická</b> – kompromitace administrátora s rozsáhlým dopadem; zasažena regulovaná služba; vždy KBI.
    fields:
      - key: final_classification
        label: Klasifikace výsledku
        type: select
        options:
          - True Positive
          - False Positive
          - Benign True Positive
        hint: 'False Positive: alert se ukázal jako legitimitní aktivita. Benign True Positive: neobvyklé přihlášení bez potvrzené škody.'
        example: True Positive
      - key: impact_level
        label: Úroveň dopadu
        type: select
        options:
          - Nízká
          - Střední
          - Vysoká
          - Kritická
        option_hints:
          Nízká: Neobvyklé přihlášení bez potvrzené aktivity útočníka. Žádný dopad na regulovanou službu.
          Střední: Potvrzená kompromitace běžného uživatele bez exfiltrace a bez dopadu na regulovanou službu.
          Vysoká: Exfiltrace dat nebo privilegovaný účet. Při zasažení reg. služby splňuje KBI dle ZKB.
          Kritická: Kompromitace administrátora s rozsáhlým dopadem. Zasažena regulovaná služba. Vždy KBI.
        hint: Úroveň Vysoká a Kritická při zasažení regulované služby zakládají povinnost hlášení NÚKIB a ÚCL.
      - key: nukib_notification_required
        label: Povinnost hlášení NÚKIB
        type: select
        options:
          - 'Povinná – Regulovaná služba + Vysoká/Kritická (ZOKB §8, vyhl. 82/2018 Sb.)'
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: 'Lhůty: do 24 h (první hlášení) · do 72 h (detailní hlášení) · do 30 dní (závěrečná zpráva) – dle vyhlášky č. 82/2018 Sb.'
      - key: ucl_notification_required
        label: Povinnost hlášení ÚCL
        type: select
        options:
          - Povinná – Regulovaná letecká služba + Vysoká/Kritická
          - Zvážit – hraniční případ
          - Není vyžadována
        hint: ÚCL (Úřad pro civilní letectví) – hlášení povinné při Vysokém nebo Kritickém dopadu na regulovanou leteckou službu.
      - key: impact_primary_service
        label: Dostupnost primárních služeb organizace
        type: select
        options:
          - Zcela nedostupné
          - Částečně nedostupné / degradované
          - Dostupné bez omezení
          - Netýká se
        hint: Primární = služby poskytované organizací klientům / uživatelům nebo klíčové interní provozní procesy.
      - key: impact_scope
        label: Rozsah zasažených uživatelů / systémů
        type: select
        options:
          - 'Celoplošný (> 50 % uživatelů nebo klíčových systémů)'
          - Významný (10–50 %)
          - 'Omezený (< 10 %)'
          - Individuální (1 uživatel / 1 systém)
      - key: impact_duration
        label: Doba výpadku / narušení (dostupnost)
        type: select
        options:
          - '> 4 hodiny'
          - 1–4 hodiny
          - 15 min – 1 hodina
          - < 15 min
          - Žádný výpadek / narušení
      - key: impact_data
        label: Dopad na data (důvěrnost / integrita)
        type: select
        options:
          - Exfiltrace dat potvrzena
          - Neoprávněný přístup k datům potvrzen
          - Integrita dat narušena
          - Žádný dopad na data
          - Nelze určit
      - key: compromise_type_final
        label: Typ kompromitace (finální)
        type: select
        options:
          - Odcizené heslo (phishing / password spray / credential reuse)
          - Token hijack / Session hijack (T1539)
          - MFA fatigue / MFA bypass (T1621)
          - Privilegovaný účet / admin kompromitace
          - Kombinace typů
          - Nelze určit
      - key: account_type_final
        label: Typ kompromitovaného účtu (finální)
        type: select
        options:
          - Běžný uživatel (bez zvýšených oprávnění)
          - Administrátor / privilegovaný účet
          - Servisní účet
          - Účet s přístupem k regulované službě
      - key: exfiltration_confirmed
        label: Exfiltrace dat
        type: select
        options:
          - Potvrzena – rozsah dokumentován
          - Podezření – nelze vyloučit
          - Vyloučena
        hint: 'Při potvrzené nebo podezřelé exfiltraci osobních údajů → povinnost informovat DPO a posoudit hlášení ÚOOÚ.'
      - key: root_cause
        label: Root Cause
        type: textarea
        example: >
          Uživatel zadal přihlašovací údaje na phishingové stránce napodobující M365 login.
          Útočník se přihlásil z RU IP, obešel MFA pomocí session cookie z Infostealer malwaru
          a exportoval kontakty z mailboxu před detekcí.
      - key: actions_taken
        label: Popis přijatých opatření
        type: textarea
        example: >
          Reset hesla a MFA · revokace všech sessions · forwarding rule odstraněno ·
          OAuth aplikace odebrána · CA politika zpřísněna · DPO informován · logy uloženy do IKB
      - key: recommendations
        label: Doporučení pro zlepšení
        type: textarea
        example: >
          Zavést Token Protection pro kritické aplikace (Exchange, SharePoint).
          Zpřísnit CA politiku – blokace non-compliant zařízení.
          Phishing-resistant MFA (FIDO2 / Windows Hello) pro administrátorské účty.
          Školení uživatelů zaměřené na MFA fatigue a session hijack.
      - key: related_service_requests
        label: Související servisní požadavky
        type: textarea
        hint: Čísla nebo odkazy na servisní požadavky (CA politiky, MFA konfigurace, IAM změny apod.)
        example: 'SR-2026-1180 – zpřísnění CA politiky · SR-2026-1181 – aktivace Token Protection'
      - key: related_security_events
        label: Navázané bezpečnostní události (UIB/IIB)
        type: textarea
        hint: >
          Reference na další šetřené bezpečnostní události otevřené v rámci tohoto incidentu nebo s ním související
          (phishingový e-mail jako vektor, Malware na zařízení uživatele, BEC navazující na kompromitaci apod.)
        example: 'UIB-10032026-1045-XXXX – Phishing (vektor kompromitace) · UIB-10032026-1220-YYYY – Malware Infostealer na PC uživatele'
      - key: reporter_notified
        label: Oznamovatel informován
        type: select
        options:
          - Ano
          - Ne
      - {key: closed_at, label: Datum uzavření, type: datetime}

