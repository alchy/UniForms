# UIB – PLAYBOOK CSIRT: PHISHING / PODEZŘELÝ E‑MAIL – v1.0
# Zpracováno dle CSIRT Playbook Phishing v1.2 / SM/25/0100/P5
# Terminologie a postup odpovídají interním playbookům CSIRT.

template_id: uib-phishing-v1
name: 'Phishing / Podezřelý e-mail'
version: '1.0'
category: Phishing
status: active
description: >
  Workbook pro řešení incidentů typu phishing – podezřelé e-maily, phishingové odkazy, podvržené přihlašovací
  stránky, škodlivé přílohy, zadání hesla uživatelem a podezření na kompromitaci identity. Pokrývá čtyři scénáře
  odezvy: A) nekliknutí, B) kliknutí bez zadání údajů, C) zadání hesla (možná kompromitace účtu),
  D) podezření na malware. Primárně cílí na prostředí MIS. L1 ITS provádí pouze příjem UIB/IIB, evidenci v TIS
  a okamžité předání Koordinátorovi CSIRT (L2). Zpracováno dle CSIRT Playbook Phishing v1.2 a SM/25/0100/P5.
mitre_tactic: Initial Access
mitre_technique: T1566 – Phishing
mitre_subtechnique: T1566.002
data_sources:
  - Exchange / M365 mail logy (mail trace, message headers)
  - M365 Defender (Safe Links, Safe Attachments, antiphishing, URLScan)
  - AAD / Azure AD sign-in logy
  - Proxy / URL filtering logy
  - EDR / AV (endpoint – scénář D)
  - Sandbox (Any.Run, Joe Sandbox nebo interní – analýza příloh)
  - SIEM

sections:

  - id: header
    type: workbook_header
    title: Hlavička
    fields:
      - key: case_title
        label: Stručný popis události
        hint: Výstižný popis pro odlišení od ostatních případů stejné šablony
        example: 'Phishing – podezřelý e-mail s odkazem na fake přihlašovací stránku M365 · odesílatel: helpdesk@firma-support[.]com'
      - {key: last_saved, label: Datum poslední aktualizace UIB, editable: false, auto_value: last_saved}
      - key: incident_coordinator
        label: Koordinátor incidentu (CSIRT – L2)
        hint: Koordinátor CSIRT přebírá řízení od L1 ITS – vyplní se tlačítkem Převzít.

  - id: classification
    type: classification
    title: Klasifikace
    fields:
      - {key: mitre_tactic, label: MITRE Tactic, editable: false, auto_value: template_mitre_tactic}
      - {key: mitre_technique, label: MITRE Technique, editable: false, auto_value: template_mitre_technique}
      - key: mitre_subtechnique
        label: MITRE Sub-technique / Typ phishingu
        type: select
        options:
          - T1566.002 – Spearphishing Link (phishingový odkaz)
          - T1566.001 – Spearphishing Attachment (škodlivá příloha)
          - T1566.003 – Spearphishing via Service (zneužití legitimní služby)
          - T1598.003 – Spearphishing Link – Credential Harvesting (krádež přihlašovacích údajů)
          - Kombinace typů
          - Nelze určit
        hint: >
          Vyplň po Posouzení, až je znám způsob útoku.
          Pokud uživatel zadal heslo → zvaž eskalaci dle workbooku Kompromitace účtu (uib-account-compromise-v1).
          Pokud otevřel podezřelou přílohu → zvaž eskalaci dle workbooku Malware (uib-malware-v1).
      - {key: data_sources, label: Doporučené zdroje dat pro investigaci, editable: false, auto_value: template_data_sources}

  - id: contacts
    title: Kontaktní matice
    type: contact_table
    description: >
      Kontakty pro investigaci a eskalaci. Vyplň dle aktuální struktury organizace.
      Koordinátor CSIRT řídí celou technickou reakci – administrátoři jednají výhradně na jeho pokyn.
      L1 ITS předává incident Koordinátorovi CSIRT telefonicky nebo e-mailem ihned po zaevidování v TIS.
    columns:
      - system_role
      - name
      - email
      - phone
      - when_to_contact
    column_labels:
      system_role: Systém / role
      name: Jméno
      email: E-mail
      phone: Telefon
      when_to_contact: Kdy kontaktovat
    editable_columns:
      - name
      - email
      - phone
    allow_append: true
    append_row_template:
      system_role: null
      name: null
      email: null
      phone: null
      when_to_contact: null
    rows:
      - system_role: L1 ITS (Service Desk H24)
        name: ITS Service Desk
        email: its@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: Příjem UIB/IIB, evidence v TIS, okamžité předání Koordinátoru CSIRT
      - system_role: Koordinátor incidentu CSIRT (L2)
        name: Koordinátor CSIRT
        email: csirt@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: Přebírá řízení od L1 – okamžité předání po zaevidování UIB/IIB v TIS
      - system_role: CSIRT analytici
        name: CSIRT – analytický tým
        email: csirt@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: Technická analýza e-mailu, záhlaví, URL, přílohy, logů a IoC; aktivace Koordinátorem
      - system_role: Správce Exchange / M365
        name: Administrátor M365
        email: m365admin@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: E-mailové logy, Search & Purge, Safe Links, mail trace, blokace domény; aktivace Koordinátorem
      - system_role: Administrátor MIS
        name: Administrátor MIS
        email: mis@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: Součinnost a lokální úkony v prostředí MIS (ověření doručení, lokální dopady); aktivace Koordinátorem
      - system_role: Správce identity / IAM (AAD)
        name: Administrátor IAM
        email: iam@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: 'Reset hesla, MFA, revokace tokenů – při podezření na kompromitaci účtu (Scénář C)'
      - system_role: CISO
        name: CISO
        email: ciso@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: Závažnost Vysoká / Kritická nebo rozsáhlá kampaň zasahující regulovanou službu
      - system_role: ISO
        name: ISO
        email: iso@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: Závažnost Kritická / dle interní politiky
      - system_role: DPO
        name: DPO
        email: dpo@firma.cz
        phone: +420 XXX XXX XXX
        when_to_contact: Pokud došlo k přístupu k osobním údajům nebo narušení důvěrnosti dat (GDPR – 72 h lhůta)
      - system_role: CERT / NÚKIB
        name: NÚKIB
        email: podatelna@nukib.cz
