# SOC Collection – konfigurační soubor kolekce
#
# Kolekce pro Security Operations Center (SOC / CSIRT).
# Každý záznam reprezentuje jeden bezpečnostní incident (UIB workbook).
# Zkopíruj soubor do adresáře collections_dir (nastaveného v Settings).
# Název souboru musí odpovídat hodnotě id níže (soc.yaml).
#
# Schéma modelu: app/models/collection.py
# Dokumentace:   docs/KOLEKCE.md

# ── Identita kolekce ──────────────────────────────────────────────────────────

# Technický identifikátor kolekce – musí odpovídat názvu YAML souboru (bez přípony).
# Používá se v URL cestách (/records/soc), v API i jako klíč pro přiřazení rolí.
id: soc

# Zobrazovaný název kolekce (v sidebaru, záhlaví stránky).
name: "SOC – Security Operations Center"

# Stručný popis účelu kolekce – zobrazuje se v dashboardu.
description: >
  Kolekce UIB workbooků pro CSIRT/SOC tým. Pokrývá řešení bezpečnostních incidentů
  dle interních CSIRT postupů, NIST SP 800-61 a MITRE ATT&CK frameworku.
  Každý workbook provází analytika celým cyklem: detekce → triage → odezva → uzavření.

# ── Přizpůsobení terminologie ─────────────────────────────────────────────────
#
# Přepíše výchozí UI popisky pro tuto kolekci.
# Klíče odpovídají polím třídy TerminologyConfig v app/config.py.
# Neuvedené klíče se převezmou z uniforms.yaml (nebo z vestavěných výchozích hodnot).

terminology:
  record_id_label: "ID UIB"
  records_subtitle: "Všechny incidenty"
  templates_subtitle: "Dostupné workbooky"
  dashboard_subtitle: "Přehled UIB"
  new_record_btn: "Nová UIB"
  coordinator_label: "Koordinátor CSIRT"
  take_over_btn: "Převzít"
  status_active: "Aktivní"
  status_draft: "Rozpracovaný"
  status_deprecated: "Zrušen"

# ── Workflow stavů záznamu ────────────────────────────────────────────────────
#
# Definuje životní cyklus incidentu.
# initial_state musí odpovídat jednomu z id níže.
# Barvy odpovídají Bootstrap 5 variantám: primary, secondary, success,
# danger, warning, info (viz getStatusBadgeClass() v uniforms.js).

workflow:
  initial_state: new
  states:
    - id: new
      label: "Nové"
      color: secondary
    - id: open
      label: "Přiřazeno"
      color: primary
    - id: in_progress
      label: "V řešení"
      color: warning
    - id: on_hold
      label: "Pozastaveno"
      color: info
    - id: closed
      label: "Uzavřeno"
      color: success

# ── Formát ID záznamu ─────────────────────────────────────────────────────────
#
# Definuje, jak se generuje unikátní ID nového incidentu.
# Dostupné tokeny:
#   {prefix}     – hodnota z klíče prefix níže
#   {YYYYMM}     – rok a měsíc (202506)
#   {DDMMYYYY}   – den, měsíc, rok (15062025)
#   {YYYY}       – rok (2025)
#   {MM}         – měsíc (06)
#   {DD}         – den (15)
#   {HHMM}       – hodina a minuta (1432)
#   {rand:04d}   – náhodné číslo 0–9999, zarovnané na 4 číslice (0042)
#   {rand}       – náhodné číslo bez zarovnání

id_format:
  prefix: UIB
  format: "{prefix}-{DDMMYYYY}-{rand:04d}"

# ── Sloupce v seznamu záznamů ─────────────────────────────────────────────────
#
# Určuje, která pole ze záznamu se zobrazí jako sloupce v tabulce /records/soc.
# Vždy se zobrazují implicitní sloupce: ID záznamu, šablona, stav, datum vytvoření.
# key  – klíč pole v šabloně (shodný s klíčem v YAML šabloně)
# label – záhlaví sloupce v UI

list_columns:
  - key: case_title
    label: "Popis události"
  - key: incident_coordinator
    label: "Koordinátor CSIRT"

# ── Role v kolekci ────────────────────────────────────────────────────────────
#
# Definuje role dostupné pro přiřazení uživatelů k této kolekci.
# id musí být jedno z: collection_admin, collection_user.
#   collection_admin – může vytvářet a mazat záznamy, spravovat šablony
#   collection_user  – může prohlížet a editovat záznamy
# label – zobrazovaný název role v UI správy uživatelů

roles:
  - id: collection_admin
    label: "CSIRT Lead"
  - id: collection_user
    label: "CSIRT Analytik"

# ── Titulek záznamu ───────────────────────────────────────────────────────────
#
# Klíč pole, jehož hodnota se zobrazí jako nadpis v záhlaví detailu záznamu.
# Pole se hledá ve všech sekcích šablony (včetně vnořených section_groups).
# Pokud pole není nalezeno nebo title_field chybí, zobrazí se název šablony.

title_field: case_title

# ── Tlačítko Převzít ──────────────────────────────────────────────────────────
#
# Zobrazí tlačítko "Převzít" v záhlaví detailu záznamu.
# Po kliknutí zapíše aktuálního přihlášeného uživatele (nebo timestamp) do
# zvoleného pole záznamu.
# field      – klíč pole, do kterého se zapíše hodnota
# value_type – co se zapíše:
#   username  → přihlašovací jméno aktuálního uživatele (výchozí)
#   timestamp → aktuální UTC čas ve formátu ISO-8601
# Pokud sekci take_over vynecháš, tlačítko se vůbec nezobrazí.

take_over:
  field: incident_coordinator
  value_type: username
