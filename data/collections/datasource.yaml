# Datasource Collection – konfigurační soubor kolekce
#
# Kolekce průvodek datových zdrojů napojených na SOC/SIEM.
# Každý záznam dokumentuje jeden logový zdroj – technické parametry,
# retenční politiku, monitoring dostupnosti a přehled detekčních use cases.
# Zkopíruj soubor do adresáře collections_dir (nastaveného v Settings).
# Název souboru musí odpovídat hodnotě id níže (datasource.yaml).
#
# Schéma modelu: app/models/collection.py
# Dokumentace:   docs/KOLEKCE.md

# ── Identita kolekce ──────────────────────────────────────────────────────────

# Technický identifikátor kolekce – musí odpovídat názvu YAML souboru (bez přípony).
# Používá se v URL cestách (/records/datasource), v API i jako klíč pro přiřazení rolí.
id: datasource

# Zobrazovaný název kolekce (v sidebaru, záhlaví stránky).
name: "Datové zdroje"

# Stručný popis účelu kolekce – zobrazuje se v dashboardu.
description: >
  Dokumentace datových zdrojů napojených na SOC/SIEM.
  Každý záznam popisuje jeden logový zdroj – technické parametry přenosu,
  retenční politiku, monitoring dostupnosti a přehled detekčních use cases.

# ── Přizpůsobení terminologie ─────────────────────────────────────────────────
#
# Přepíše výchozí UI popisky pro tuto kolekci.
# Klíče odpovídají polím třídy TerminologyConfig v app/config.py.
# Neuvedené klíče se převezmou z uniforms.yaml (nebo z vestavěných výchozích hodnot).

terminology:
  record_id_label: "ID průvodky"
  records_subtitle: "Všechny datové zdroje"
  templates_subtitle: "Dostupné šablony"
  dashboard_subtitle: "Přehled datových zdrojů"
  new_record_btn: "Nová průvodka"
  record_owner_label: "Vlastník průvodky"
  take_over_btn: "Převzít vlastnictví"
  status_active: "Aktivní"
  status_draft: "Rozpracovaná"
  status_deprecated: "Archivní"

# ── Workflow stavů záznamu ────────────────────────────────────────────────────
#
# Sleduje životní cyklus dokumentu průvodky (ne operační status datového zdroje –
# ten je samostatným polem source_status přímo v šabloně).
# initial_state musí odpovídat jednomu z id níže.
# color: Bootstrap 5 varianta (primary, secondary, success, danger, warning, info, dark)
#        NEBO libovolná CSS barva (např. green, #e74c3c, steelblue, rgb(100,180,60)).

workflow:
  initial_state: draft
  states:
    - id: draft
      label: "Rozpracovaná"
      color: grey
    - id: in_review
      label: "V přípravě"
      color: blue
    - id: approved
      label: "Schválená"
      color: green
    - id: archived
      label: "Archivní"
      color: black

# ── Formát ID záznamu ─────────────────────────────────────────────────────────
#
# Dostupné tokeny:
#   {prefix}     – hodnota z klíče prefix níže
#   {YYYYMM}     – rok a měsíc (202506)
#   {DDMMYYYY}   – den, měsíc, rok (15062025)
#   {YYYY}       – rok (2025)
#   {MM}         – měsíc (06)
#   {DD}         – den (15)
#   {HHMM}       – hodina a minuta (1432)
#   {rand:04d}   – náhodné číslo 0–9999, zarovnané na 4 číslice (0042)
#   {rand}       – náhodné číslo bez zarovnání

id_format:
  prefix: DS
  format: "{prefix}-{YYYYMM}-{rand:04d}"

# ── Sloupce v seznamu záznamů ─────────────────────────────────────────────────
#
# Určuje, která pole ze záznamu se zobrazí jako sloupce v tabulce /records/datasource.
# Vždy se zobrazují implicitní sloupce: ID záznamu, šablona, stav, datum vytvoření.
# key  – klíč pole v šabloně (shodný s klíčem v YAML šabloně)
# label – záhlaví sloupce v UI

list_columns:
  - key: source_name
    label: "Název zdroje"
  - key: source_status
    label: "Status zdroje"
  - key: record_owner
    label: "Vlastník průvodky"

# ── Role v kolekci ────────────────────────────────────────────────────────────
#
# Definuje role dostupné pro přiřazení uživatelů k této kolekci.
# id musí být jedno z: collection_admin, collection_user.
#   collection_admin – může vytvářet a mazat záznamy, spravovat šablony
#   collection_user  – může prohlížet a editovat záznamy
# label – zobrazovaný název role v UI správy uživatelů

roles:
  - id: collection_admin
    label: "SOC Lead"
  - id: collection_user
    label: "SOC Analytik"

# ── Titulek záznamu ───────────────────────────────────────────────────────────
#
# Klíč pole, jehož hodnota se zobrazí jako nadpis v záhlaví detailu záznamu.
# Pole se hledá ve všech sekcích šablony (včetně vnořených section_groups).
# Pokud pole není nalezeno nebo title_field chybí, zobrazí se název šablony.

title_field: source_name

# ── Tlačítko Převzít ──────────────────────────────────────────────────────────
#
# Zobrazí tlačítko "Převzít garanci" v záhlaví detailu záznamu.
# Po kliknutí zapíše aktuálního přihlášeného uživatele do pole record_owner.
# field      – klíč pole, do kterého se zapíše hodnota
# value_type – co se zapíše:
#   username  → přihlašovací jméno aktuálního uživatele (výchozí)
#   timestamp → aktuální UTC čas ve formátu ISO-8601
# Pokud sekci take_over vynecháš, tlačítko se vůbec nezobrazí.

take_over:
  field: record_owner
  value_type: username
